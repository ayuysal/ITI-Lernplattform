<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Essenz – Was du wirklich wissen musst</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0e11;--surface:#18171d;--border:#1e2230;
  --text:#e2e4ea;--muted:#6b7084;
  --amber:#f5c542;--teal:#5ec4b6;
  --c-netz:#06b6d4;--c-sig:#a78bfa;--c-tcp:#fb923c;--c-info:#22c55e;--c-formal:#f472b6;--c-grund:#22d3ee;
  --radius:12px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;line-height:1.5}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
a{color:inherit;text-decoration:none}

.back{display:inline-block;padding:0.6rem 0;margin:0.8rem 1.5rem;font-size:.85rem;color:var(--muted);transition:color .2s}
.back:hover{color:var(--text)}

header{text-align:center;padding:0.5rem 1.5rem 1rem}
header .tag{font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.12em;color:var(--amber);text-transform:uppercase}
header h1{font-family:'Outfit',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;margin:.3rem 0}
header p{color:var(--muted);font-size:.9rem;max-width:600px;margin:0 auto}

/* Tabs */
.tabs{display:flex;gap:.5rem;justify-content:center;margin:1rem 0 .8rem}
.tab-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.5rem 1.2rem;color:var(--muted);font-family:'Outfit',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s}
.tab-btn:hover{border-color:var(--text);color:var(--text)}
.tab-btn.active{border-color:var(--amber);color:var(--amber);background:rgba(245,197,66,.08)}

/* Filter pills */
.filters{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;padding:0 1rem;margin-bottom:1.5rem}
.fbtn{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.3rem .6rem;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.65rem;cursor:pointer;transition:all .2s}
.fbtn:hover{border-color:var(--text);color:var(--text)}
.fbtn.active{border-color:var(--amber);color:var(--amber);background:rgba(245,197,66,.08)}

/* Content area */
.content{max-width:900px;margin:0 auto;padding:0 1rem 4rem}
.tab-content{display:none}
.tab-content.active{display:block}

/* ── Flip Cards Grid ── */
.flip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}

.flip-card-wrapper{perspective:800px;min-height:220px}
.flip-card{width:100%;height:100%;min-height:220px;position:relative;transform-style:preserve-3d;transition:transform .5s ease;cursor:pointer}
.flip-card.flipped{transform:rotateY(180deg)}

.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);padding:1.2rem;display:flex;flex-direction:column}
.flip-front{background:var(--surface);border:1px solid var(--border);justify-content:center;align-items:center;text-align:center}
.flip-front:hover{border-color:rgba(245,197,66,.3);box-shadow:0 0 20px rgba(245,197,66,.06)}
.flip-back{background:linear-gradient(135deg,#13131a,#1a1424);border:1px solid rgba(245,197,66,.25);transform:rotateY(180deg);overflow-y:auto;box-shadow:0 0 25px rgba(245,197,66,.08)}

.flip-front .card-domain{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.6rem;padding:.15rem .5rem;border-radius:4px;border:1px solid var(--border)}
.flip-front h3{font-family:'Outfit',sans-serif;font-size:1rem;font-weight:600;color:#fff;line-height:1.4}
.flip-front .hint{font-size:.7rem;color:var(--muted);margin-top:.8rem;font-style:italic}

.flip-back .back-title{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--amber);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.6rem}
.flip-back ul{list-style:none;padding:0;margin:0}
.flip-back li{font-size:.8rem;color:var(--text);line-height:1.6;margin-bottom:.5rem;padding-left:.8rem;position:relative}
.flip-back li::before{content:'›';position:absolute;left:0;color:var(--amber);font-weight:700}
.flip-back code{font-family:'JetBrains Mono',monospace;background:rgba(245,197,66,.1);color:var(--amber);padding:.1rem .25rem;border-radius:3px;font-size:.75rem}

/* ── Concept Cards ── */
.concept-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.2rem;transition:border-color .2s}
.concept-card:hover{border-color:rgba(245,197,66,.3)}
.concept-card .c-header{display:flex;align-items:center;gap:.8rem;margin-bottom:1rem}
.concept-card .c-icon{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.concept-card .c-title{font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:700;color:#fff}
.concept-card .c-subtitle{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:.06em}
.concept-card .c-desc{font-size:.85rem;color:var(--muted);margin-bottom:1rem;line-height:1.6}
.concept-card pre{background:#0a0a10;border:1px solid #1e2230;border-radius:8px;padding:1rem;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:.75rem;line-height:1.7;color:var(--text);margin:0}
.concept-card pre .hl{color:var(--amber)}
.concept-card pre .hl2{color:var(--teal)}
.concept-card pre .hl3{color:#a78bfa}
.concept-card pre .dim{color:#5a5a72}

/* Counter badge */
.count-badge{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);text-align:center;margin-bottom:1rem}
.count-badge span{color:var(--amber)}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

@media(max-width:600px){
  .flip-grid{grid-template-columns:1fr}
  .flip-card-wrapper{min-height:200px}
  .flip-card{min-height:200px}
  .flip-front,.flip-back{min-height:200px}
  .concept-card pre{font-size:.65rem;padding:.7rem}
}
</style>
</head>

/* ═══════════════════════════════════════════════════════
   STATE & RENDERING
   ═══════════════════════════════════════════════════════ */
let activeTab = 'auswendig';
let activeDomain = 'all';

function getDomainMeta(id) {
  return DOMAINS.find(d => d.id === id) || DOMAINS[0];
}

function renderFilters() {
  const el = document.getElementById('filters');
  el.innerHTML = DOMAINS.map(d =>
    `<button class="fbtn${d.id===activeDomain?' active':''}" data-domain="${d.id}" style="${d.id!=='all'?'border-color:'+d.color+'33;':''}${d.id===activeDomain?'border-color:'+d.color+';color:'+d.color+';background:'+d.color+'14;':''}">${d.label}</button>`
  ).join('');
  el.querySelectorAll('.fbtn').forEach(btn => {
    btn.onclick = () => { activeDomain = btn.dataset.domain; render(); };
  });
}

function renderFlipCards() {
  const grid = document.getElementById('flipGrid');
  const filtered = activeDomain === 'all' ? CARDS : CARDS.filter(c => c.domain === activeDomain);
  grid.innerHTML = filtered.map((card, i) => {
    const dm = getDomainMeta(card.domain);
    return `<div class="flip-card-wrapper">
      <div class="flip-card" onclick="this.classList.toggle('flipped')">
        <div class="flip-front">
          <div class="card-domain" style="color:${dm.color};border-color:${dm.color}44">${dm.label}</div>
          <h3>${card.title}</h3>
          <div class="hint">Klick zum Aufdecken</div>
        </div>
        <div class="flip-back">
          <div class="back-title">${card.title}</div>
          <ul>${card.facts.map(f => `<li>${f}</li>`).join('')}</ul>
        </div>
      </div>
    </div>`;
  }).join('');
  return filtered.length;
}

function renderConcepts() {
  const grid = document.getElementById('conceptGrid');
  const filtered = activeDomain === 'all' ? CONCEPTS : CONCEPTS.filter(c => c.domain === activeDomain);
  grid.innerHTML = filtered.map(c => {
    const dm = getDomainMeta(c.domain);
    return `<div class="concept-card">
      <div class="c-header">
        <div class="c-icon" style="background:${dm.color}15;color:${dm.color}">${c.icon}</div>
        <div>
          <div class="c-title">${c.title}</div>
          <div class="c-subtitle" style="color:${dm.color}">${dm.label}</div>
        </div>
      </div>
      <div class="c-desc">${c.desc}</div>
      <pre>${c.diagram}</pre>
    </div>`;
  }).join('');
  return filtered.length;
}

function render() {
  renderFilters();
  const flipCount = renderFlipCards();
  const conceptCount = renderConcepts();
  const badge = document.getElementById('countBadge');
  if (activeTab === 'auswendig') {
    badge.innerHTML = `<span>${flipCount}</span> Karten`;
  } else {
    badge.innerHTML = `<span>${conceptCount}</span> Konzept-Diagramme`;
  }
}

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + activeTab).classList.add('active');
    render();
  };
});

// Initial render
render();
</script>
