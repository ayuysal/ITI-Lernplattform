<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Intensiv — Deep-Dive Lernen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
/* ═══ RESET & THEME ═══ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0f14;--surface:#161a24;--surface2:#1e2436;--border:#2a2f42;
  --text:#e2e8f0;--text2:#94a3b8;--muted:#64748b;
  --accent:#00e5ff;--accent2:#7c3aed;--amber:#f5c542;
  --green:#22c55e;--red:#ef4444;--teal:#06b6d4;--pink:#f472b6;
  --purple:#a78bfa;--orange:#fb923c;
  --radius:12px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.6;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}

/* ═══ AUTH BAR ═══ */
.auth-bar{position:fixed;top:8px;right:12px;z-index:1000;display:flex;align-items:center;gap:.4rem;font-family:'JetBrains Mono',monospace;font-size:.65rem}
.auth-bar button{background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:inherit;transition:all .2s}
.auth-bar button:hover{border-color:var(--accent);color:var(--accent)}
.auth-bar .user-name{color:var(--green);margin-right:.3rem}
.auth-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;justify-content:center;align-items:center}
.auth-overlay.show{display:flex}
.auth-modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:320px;max-width:90vw}
.auth-modal h3{font-family:'Outfit',sans-serif;margin-bottom:1rem;color:var(--accent)}
.auth-modal input{width:100%;padding:.5rem;margin-bottom:.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit}
.auth-modal .auth-btns{display:flex;gap:.5rem;margin-top:.5rem}
.auth-modal .auth-btns button{flex:1;padding:.5rem;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.7rem;transition:all .2s}
.auth-modal .auth-btns button:first-child{background:var(--accent);color:#000;border-color:var(--accent)}
.auth-modal .auth-btns button:last-child{background:var(--surface2);color:var(--text2)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.5rem 1.2rem;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:.7rem;z-index:3000;transition:transform .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ═══ LAYOUT ═══ */
.back{display:inline-block;color:var(--text2);text-decoration:none;font-size:.8rem;padding:1rem 1.5rem;transition:color .2s}
.back:hover{color:var(--accent)}
header{text-align:center;padding:0 1rem 1rem}
header .tag{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--amber);letter-spacing:.15em;text-transform:uppercase;margin-bottom:.3rem}
header h1{font-family:'Outfit',sans-serif;font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.3rem}
header p{color:var(--text2);font-size:.85rem;max-width:600px;margin:0 auto}
.content{max-width:960px;margin:0 auto;padding:0 1rem 4rem}

/* ═══ PRIMARY TABS ═══ */
.tabs{display:flex;gap:.5rem;justify-content:center;margin:1rem 0 .5rem}
.tab-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.55rem 1.5rem;color:var(--muted);font-family:'Outfit',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.4rem}
.tab-btn:hover{border-color:var(--accent);color:var(--text)}
.tab-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.06)}

/* ═══ SUB NAVIGATION ═══ */
.sub-nav{display:flex;flex-wrap:wrap;gap:.35rem;justify-content:center;padding:0 1rem;margin-bottom:1rem}
.sub-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.3rem .7rem;color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:.6rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.sub-btn:hover{border-color:var(--accent);color:var(--text)}
.sub-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.06)}

/* ═══ SECTION PILLS (Theorie / Uebungen / Simulation) ═══ */
.section-pills{display:flex;gap:.3rem;justify-content:center;margin-bottom:1.2rem}
.pill{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:.3rem .9rem;color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:.6rem;cursor:pointer;transition:all .2s}
.pill:hover{border-color:var(--accent);color:var(--text)}
.pill.active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.06)}

/* ═══ PROGRESS BAR ═══ */
.topic-progress{display:flex;align-items:center;gap:.5rem;justify-content:center;margin-bottom:1rem;font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--text2)}
.prog-bar{width:200px;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .3s}

/* ═══ CONCEPT BOXES ═══ */
.concept{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius);padding:1rem 1.2rem;margin-bottom:1rem}
.concept.def{border-left-color:var(--teal)}
.concept.warn{border-left-color:var(--amber)}
.concept.formula{border-left-color:var(--green)}
.concept.example{border-left-color:var(--purple)}
.concept.tip{border-left-color:var(--pink)}
.concept-label{font-family:'JetBrains Mono',monospace;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.4rem;opacity:.7}
.concept.def .concept-label{color:var(--teal)}
.concept.warn .concept-label{color:var(--amber)}
.concept.formula .concept-label{color:var(--green)}
.concept.example .concept-label{color:var(--purple)}
.concept.tip .concept-label{color:var(--pink)}
.concept h4{font-family:'Outfit',sans-serif;font-size:.9rem;margin-bottom:.4rem;color:#fff}
.concept p,.concept li{font-size:.82rem;color:var(--text);line-height:1.7}
.concept ul{padding-left:1.2rem;margin-top:.3rem}
.concept code{font-family:'JetBrains Mono',monospace;background:rgba(0,229,255,.08);color:var(--accent);padding:.1rem .3rem;border-radius:3px;font-size:.75rem}

/* ═══ DATA TABLES ═══ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:1rem}
.card-title{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--amber);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.6rem}
.data-table{width:100%;border-collapse:collapse;font-size:.78rem}
.data-table th{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);text-align:left;padding:.5rem .6rem;border-bottom:1px solid var(--border);letter-spacing:.05em;text-transform:uppercase}
.data-table td{padding:.45rem .6rem;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top}
.data-table tr:hover td{background:rgba(0,229,255,.03)}
.data-table .tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.6rem;padding:.1rem .4rem;border-radius:4px;background:rgba(0,229,255,.08);color:var(--accent)}

/* ═══ FORMULA BOX ═══ */
.formula-box{background:#0a1a0a;border:1px solid rgba(34,197,94,.2);border-radius:var(--radius);padding:.8rem 1.2rem;font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--green);text-align:center;margin:.8rem 0;letter-spacing:.02em}

/* ═══ TWO COLUMN ═══ */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
@media(max-width:640px){.two-col{grid-template-columns:1fr}}

/* ═══ ACCORDION ═══ */
.accordion-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.5rem;overflow:hidden}
.accordion-toggle{width:100%;background:none;border:none;color:var(--text);padding:.7rem 1rem;font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .2s}
.accordion-toggle:hover{color:var(--accent)}
.accordion-arrow{transition:transform .2s;font-size:.7rem}
.accordion-content{display:none;padding:0 1rem .8rem;font-size:.8rem;color:var(--text2);line-height:1.7}
.accordion-content.open{display:block}

/* ═══ EXERCISE SECTION ═══ */
.exercise-wrap{margin-bottom:1rem}
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.2rem;margin-bottom:.8rem}
.ex-meta{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--text2);margin-bottom:.5rem;display:flex;gap:.5rem;align-items:center}
.ex-type{padding:.1rem .4rem;border-radius:4px;background:rgba(0,229,255,.08);color:var(--accent)}
.ex-q{font-size:.85rem;margin-bottom:.7rem;line-height:1.6}
.ex-q code{font-family:'JetBrains Mono',monospace;background:rgba(0,229,255,.08);color:var(--accent);padding:.1rem .3rem;border-radius:3px;font-size:.78rem}
.ex-opts{display:flex;flex-direction:column;gap:.35rem}
.ex-opt{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.5rem .8rem;cursor:pointer;font-size:.8rem;transition:all .2s;display:flex;align-items:center;gap:.5rem}
.ex-opt:hover{border-color:var(--accent);background:rgba(0,229,255,.04)}
.ex-opt.selected{border-color:var(--accent);background:rgba(0,229,255,.08)}
.ex-opt.correct{border-color:var(--green);background:rgba(34,197,94,.1);color:var(--green)}
.ex-opt.wrong{border-color:var(--red);background:rgba(239,68,68,.1);color:var(--red)}
.ex-radio{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;transition:all .2s}
.ex-opt.selected .ex-radio{border-color:var(--accent);background:var(--accent)}
.ex-opt.correct .ex-radio{border-color:var(--green);background:var(--green)}
.ex-opt.wrong .ex-radio{border-color:var(--red);background:var(--red)}
.ex-tf{display:flex;gap:.5rem}
.ex-tf button{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.5rem;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--text);transition:all .2s}
.ex-tf button:hover{border-color:var(--accent)}
.ex-tf button.selected{border-color:var(--accent);background:rgba(0,229,255,.08)}
.ex-tf button.correct{border-color:var(--green);background:rgba(34,197,94,.1);color:var(--green)}
.ex-tf button.wrong{border-color:var(--red);background:rgba(239,68,68,.1);color:var(--red)}
.ex-input{width:100%;padding:.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.8rem;outline:none}
.ex-input:focus{border-color:var(--accent)}
.ex-feedback{margin-top:.5rem;padding:.5rem .8rem;border-radius:8px;font-size:.75rem;line-height:1.5;display:none}
.ex-feedback.show{display:block}
.ex-feedback.ok{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:var(--green)}
.ex-feedback.nok{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red)}
.ex-check-btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:.5rem 1.5rem;font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:.5rem}
.ex-check-btn:hover{opacity:.85}
.ex-check-btn:disabled{opacity:.4;cursor:default}
.ex-score{text-align:center;padding:1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-top:1rem}
.ex-score .big{font-family:'Outfit',sans-serif;font-size:2rem;font-weight:700;color:var(--accent)}

/* ═══ MATCH EXERCISE ═══ */
.ex-match-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.ex-match-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.5rem .7rem;font-size:.78rem;cursor:pointer;transition:all .2s;text-align:center}
.ex-match-item:hover{border-color:var(--accent)}
.ex-match-item.sel{border-color:var(--accent);background:rgba(0,229,255,.1);color:var(--accent)}
.ex-match-item.matched{border-color:var(--green);background:rgba(34,197,94,.08);color:var(--green);cursor:default}
.ex-match-item.wrong-flash{border-color:var(--red);background:rgba(239,68,68,.1)}

/* ═══ ORDER EXERCISE ═══ */
.ex-order-list{display:flex;flex-direction:column;gap:.35rem}
.ex-order-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.5rem .8rem;font-size:.78rem;cursor:grab;transition:all .2s;display:flex;align-items:center;gap:.5rem}
.ex-order-item:hover{border-color:var(--accent)}
.ex-order-item .grip{color:var(--muted);font-size:.7rem}
.ex-order-item.correct{border-color:var(--green);background:rgba(34,197,94,.08)}
.ex-order-item.wrong{border-color:var(--red);background:rgba(239,68,68,.08)}

/* ═══ SIMULATION CONTAINERS ═══ */
.sim-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;margin-bottom:1rem}
.sim-title{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.8rem;display:flex;align-items:center;gap:.4rem}
.sim-controls{display:flex;gap:.4rem;margin-bottom:.8rem;flex-wrap:wrap}
.sim-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.35rem .7rem;color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:.6rem;cursor:pointer;transition:all .2s}
.sim-btn:hover{border-color:var(--accent);color:var(--accent)}
.sim-btn.active{border-color:var(--green);color:var(--green)}
.sim-area{min-height:120px;position:relative}
.sim-input{padding:.4rem .6rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.7rem;outline:none;width:200px}
.sim-input:focus{border-color:var(--accent)}
.sim-log{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--text2);margin-top:.6rem;padding:.5rem;background:var(--surface2);border-radius:6px;max-height:150px;overflow-y:auto;line-height:1.6}

/* ═══ BUBBLE SORT BARS ═══ */
.bs-bars{display:flex;align-items:flex-end;gap:3px;height:160px;padding:0 .5rem}
.bs-bar{flex:1;border-radius:4px 4px 0 0;transition:all .4s;position:relative;min-width:16px;display:flex;align-items:flex-start;justify-content:center}
.bs-bar span{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:#fff;margin-top:2px}
.bs-bar.comparing{background:var(--amber)!important;box-shadow:0 0 10px rgba(245,197,66,.4)}
.bs-bar.swapping{background:var(--red)!important;box-shadow:0 0 10px rgba(239,68,68,.4)}
.bs-bar.sorted{background:var(--green)!important}

/* ═══ HASH TABLE ═══ */
.ht-slots{display:flex;gap:2px;flex-wrap:wrap;margin:.5rem 0}
.ht-slot{width:60px;height:50px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.6rem;transition:all .3s}
.ht-slot .idx{font-size:.5rem;color:var(--muted)}
.ht-slot.filled{border-color:var(--accent);background:rgba(0,229,255,.06)}
.ht-slot.collision{border-color:var(--amber);background:rgba(245,197,66,.06)}
.ht-slot.inserting{border-color:var(--green);background:rgba(34,197,94,.1);box-shadow:0 0 8px rgba(34,197,94,.3)}

/* ═══ DFA/NFA SIMULATOR ═══ */
.auto-svg{width:100%;height:200px;background:var(--surface2);border-radius:8px}
.auto-state{fill:var(--surface);stroke:var(--border);stroke-width:2;cursor:pointer;transition:all .3s}
.auto-state.active{fill:rgba(0,229,255,.15);stroke:var(--accent);stroke-width:3}
.auto-state.accepting{stroke-dasharray:none}
.auto-label{fill:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;text-anchor:middle;dominant-baseline:central}
.auto-edge{stroke:var(--text2);stroke-width:1.5;fill:none;marker-end:url(#arrowhead)}
.auto-edge.active{stroke:var(--accent);stroke-width:2.5}
.auto-edge-label{fill:var(--amber);font-family:'JetBrains Mono',monospace;font-size:10px;text-anchor:middle}
.auto-input-char{display:inline-block;padding:2px 6px;margin:0 1px;font-family:'JetBrains Mono',monospace;font-size:.75rem;background:var(--surface2);border:1px solid var(--border);border-radius:4px}
.auto-input-char.processed{background:rgba(34,197,94,.1);border-color:var(--green);color:var(--green)}
.auto-input-char.current{background:rgba(0,229,255,.15);border-color:var(--accent);color:var(--accent);box-shadow:0 0 6px rgba(0,229,255,.3)}

/* ═══ OSI ANIMATION ═══ */
.osi-stack{display:flex;flex-direction:column;gap:2px}
.osi-layer{padding:.45rem .8rem;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:.65rem;display:flex;justify-content:space-between;align-items:center;transition:all .4s;border:1px solid transparent}
.osi-layer.active{border-color:var(--accent);box-shadow:0 0 12px rgba(0,229,255,.15)}
.osi-header{font-size:.55rem;color:var(--amber);opacity:0;transition:opacity .4s}
.osi-header.show{opacity:1}

/* ═══ TCP HANDSHAKE ═══ */
.tcp-wrap{display:flex;justify-content:space-between;align-items:stretch;position:relative;height:220px}
.tcp-host{width:100px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:.5rem;font-family:'JetBrains Mono',monospace;font-size:.6rem}
.tcp-host .name{color:var(--accent);font-weight:600;margin-bottom:.3rem}
.tcp-arrows{flex:1;position:relative;margin:0 1rem}
.tcp-arrow{position:absolute;left:0;right:0;display:flex;align-items:center;font-family:'JetBrains Mono',monospace;font-size:.6rem;opacity:0;transition:all .5s}
.tcp-arrow.show{opacity:1}
.tcp-arrow .line{flex:1;height:2px;background:var(--accent)}
.tcp-arrow .label{padding:0 .4rem;color:var(--amber);white-space:nowrap}
.tcp-arrow .tip{color:var(--accent)}

/* ═══ SUBNETTING CALC ═══ */
.sn-form{display:grid;grid-template-columns:1fr auto 1fr;gap:.5rem;align-items:center;margin-bottom:1rem}
.sn-result{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.sn-result-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.5rem .7rem}
.sn-result-item .label{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.sn-result-item .val{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--accent);margin-top:.2rem}
.sn-binary{font-family:'JetBrains Mono',monospace;font-size:.65rem;margin-top:.5rem;padding:.5rem;background:var(--surface2);border-radius:6px;line-height:1.8;word-break:break-all}
.sn-binary .net{color:var(--accent)}
.sn-binary .host{color:var(--amber)}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ═══ RESPONSIVE ═══ */
@media(max-width:640px){
  header h1{font-size:1.5rem}
  .tabs{flex-direction:column;align-items:center}
  .sub-nav{gap:.25rem}
  .sub-btn{font-size:.5rem;padding:.25rem .5rem}
  .two-col{grid-template-columns:1fr}
  .sn-form{grid-template-columns:1fr}
  .sn-result{grid-template-columns:1fr}
  .tcp-wrap{height:260px}
  .ex-match-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="auth-bar" id="authBar"></div>
<div class="toast" id="toast"></div>

<header>

{id:'tgi-gram',title:'Grammatiken & CYK',icon:'📝',color:'#fb923c',

  {type:'concept',variant:'def',label:'CHOMSKY-NORMALFORM (CNF)',title:'',
   body:'Eine CFG ist in <b>Chomsky-Normalform</b>, wenn alle Regeln eine dieser Formen haben:<ul><li><code>A → BC</code> (zwei Variablen)</li><li><code>A → a</code> (ein Terminal)</li><li><code>S → &epsilon;</code> (nur f&uuml;r Startvariable, falls &epsilon; &isin; L)</li></ul>'},
  {type:'table',title:'Umwandlung in CNF — Schritte',

  {type:'concept',variant:'def',label:'CYK-ALGORITHMUS',title:'Cocke-Younger-Kasami',
   body:'Der CYK-Algorithmus pr&uuml;ft, ob ein Wort w von einer CFG in CNF erzeugt werden kann. <b>Laufzeit: O(n³ · |P|)</b>.<br><br>Arbeitet mit einer <b>Dreieckstabelle</b>: T[i][j] enth&auml;lt alle Variablen, die den Teilstring w[i..j] ableiten k&ouml;nnen. Wenn S &isin; T[1][n] → Wort ist in der Sprache.'},
  {type:'concept',variant:'example',label:'BEISPIEL',title:'CYK-Tabelle',
   body:'Grammatik: S→AB, A→a, B→b, S→a.<br>Wort: &ldquo;ab&rdquo;<br><br>T[1][1] = {A, S} (a ableitbar durch A→a, S→a)<br>T[2][2] = {B} (b ableitbar durch B→b)<br>T[1][2] = ? Pr&uuml;fe Teilungen: T[1][1] &times; T[2][2] = {A,S} &times; {B}. AB → S! Also T[1][2] = {S}.<br><b>S &isin; T[1][2] → &ldquo;ab&rdquo; &isin; L(G) ✓</b>'},

/* ═══════════════════════════════════════════════════════
   RENDER ENGINE
   ═══════════════════════════════════════════════════════ */
function switchSubject(subj){
  currentSubject = subj;
  currentTopic = 0;
  currentSection = 'theorie';
  document.querySelectorAll('#primaryTabs .tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.subject === subj);
  });
  render();
}

function switchTopic(idx){
  currentTopic = idx;
  currentSection = 'theorie';
  render();
}

function switchSection(sec){
  currentSection = sec;
  renderContent();
  renderPills();
}

function render(){
  renderSubNav();
  renderPills();
  renderContent();
}

function renderSubNav(){
  const topics = TOPICS[currentSubject];
  const nav = document.getElementById('subNav');
  nav.innerHTML = topics.map((t,i) =>
    `<button class="sub-btn${i===currentTopic?' active':''}" onclick="switchTopic(${i})" style="${i===currentTopic?'border-color:'+t.color+';color:'+t.color+';background:'+t.color+'14':''}">${t.icon} ${t.title}</button>`
  ).join('');
}

function renderPills(){
  const topic = TOPICS[currentSubject][currentTopic];
  const hasSim = topic.simulation && topic.simulation.type !== 'none';
  const pills = document.getElementById('sectionPills');
  pills.innerHTML = `
    <button class="pill${currentSection==='theorie'?' active':''}" onclick="switchSection('theorie')">📖 Theorie</button>
    <button class="pill${currentSection==='uebungen'?' active':''}" onclick="switchSection('uebungen')">✏️ &Uuml;bungen</button>
    ${hasSim ? `<button class="pill${currentSection==='simulation'?' active':''}" onclick="switchSection('simulation')">🎮 Simulation</button>` : ''}
  `;
}

function renderContent(){
  const topic = TOPICS[currentSubject][currentTopic];
  const area = document.getElementById('contentArea');

  if(currentSection === 'theorie') area.innerHTML = renderTheory(topic);
  else if(currentSection === 'uebungen') area.innerHTML = renderExercises(topic);
  else if(currentSection === 'simulation') { area.innerHTML = ''; renderSimulation(topic, area); }
}

/* ── Theory Renderer ── */
function renderTheory(topic){
  return topic.theory.map(block => {
    if(block.type === 'concept'){
      return `<div class="concept ${block.variant||''}">
        <div class="concept-label">${block.label||''}</div>
        ${block.title ? `<h4>${block.title}</h4>` : ''}
        <p>${block.body}</p>
      </div>`;
    }
    if(block.type === 'table'){
      return `<div class="card">
        <div class="card-title">${block.title}</div>
        <div style="overflow-x:auto">
        <table class="data-table">
          <thead><tr>${block.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${block.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
        </table>
        </div>
      </div>`;
    }
    return '';
  }).join('');
}

/* ── Exercise Renderer ── */
function renderExercises(topic){
  const tid = topic.id;
  if(!exerciseAnswers[tid]) exerciseAnswers[tid] = {};
  const checked = exerciseChecked[tid] || false;

  let html = '<div class="exercise-wrap">';
  topic.exercises.forEach((ex, qi) => {
    const ans = exerciseAnswers[tid][qi];
    html += `<div class="ex-card" id="ex-${qi}">
      <div class="ex-meta"><span class="ex-type">${ex.type.toUpperCase()}</span> Frage ${qi+1}/${topic.exercises.length}</div>
      <div class="ex-q">${ex.q}</div>`;

    if(ex.type === 'mc'){
      html += '<div class="ex-opts">';
      ex.opts.forEach((o,oi) => {
        let cls = '';
        if(checked){ cls = oi === ex.correct ? ' correct' : (oi === ans ? ' wrong' : ''); }
        else if(oi === ans) cls = ' selected';
        html += `<div class="ex-opt${cls}" onclick="pickMC('${tid}',${qi},${oi})"><div class="ex-radio"></div>${o}</div>`;
      });
      html += '</div>';
    }

    if(ex.type === 'tf'){
      html += '<div class="ex-tf">';
      ['Wahr','Falsch'].forEach((label, vi) => {
        const val = vi === 0;
        let cls = '';
        if(checked){
          if(val === ex.correct) cls = ' correct';
          else if(ans === val) cls = ' wrong';
        } else if(ans === val) cls = ' selected';
        html += `<button class="${cls}" onclick="pickTF('${tid}',${qi},${val})">${label}</button>`;
      });
      html += '</div>';
    }

    if(ex.type === 'fill'){
      const val = ans || '';
      html += `<input class="ex-input" id="fill-${qi}" value="${val}" placeholder="Antwort eingeben..." oninput="fillInput('${tid}',${qi})" ${checked?'disabled':''}>`;
    }

    if(ex.type === 'calc'){
      const val = ans || '';
      html += `<div style="display:flex;gap:.5rem;align-items:center"><input class="ex-input" style="width:150px" id="calc-${qi}" value="${val}" placeholder="Ergebnis..." oninput="calcInput('${tid}',${qi})" ${checked?'disabled':''}>${ex.unit?`<span style="font-size:.75rem;color:var(--text2)">${ex.unit}</span>`:''}</div>`;
    }

    if(ex.type === 'match'){
      html += renderMatchExercise(ex, qi, tid, checked, ans);
    }

    if(ex.type === 'order'){
      html += renderOrderExercise(ex, qi, tid, checked, ans);
    }

    // Feedback
    if(checked){
      const isCorrect = checkAnswer(ex, ans);
      html += `<div class="ex-feedback show ${isCorrect?'ok':'nok'}">${isCorrect?'✓ Richtig!':'✗ Falsch.'} ${ex.exp}</div>`;
    }

    html += '</div>';
  });

  if(!checked){
    html += `<div style="text-align:center;margin-top:1rem"><button class="ex-check-btn" onclick="checkExercises('${tid}')">✓ Antworten pr&uuml;fen</button></div>`;
  } else {
    const score = calcScore(topic);
    html += `<div class="ex-score"><div class="big">${score.correct}/${score.total}</div><div style="color:var(--text2);font-size:.8rem;margin-top:.3rem">richtige Antworten</div>
    <div style="margin-top:.8rem"><button class="ex-check-btn" onclick="resetExercises('${tid}')">↻ Nochmal versuchen</button></div></div>`;
  }

  html += '</div>';
  return html;
}

function renderMatchExercise(ex, qi, tid, checked, ans){
  if(!ans) { exerciseAnswers[tid][qi] = { pairs: [], selected: null }; ans = exerciseAnswers[tid][qi]; }
  const left = ex.pairs.map(p => p[0]);
  const right = ex.pairs.map(p => p[1]).sort(() => Math.random() - 0.5);
  // Store shuffled right if not already
  if(!ans.shuffledRight) ans.shuffledRight = right;

  let html = '<div class="ex-match-grid">';
  html += '<div>';
  left.forEach((l,i) => {
    const matched = ans.pairs && ans.pairs.find(p => p[0] === i);
    let cls = matched ? ' matched' : (ans.selected === 'l'+i ? ' sel' : '');
    if(checked && matched){
      const correctRight = ex.pairs[i][1];
      cls = ans.shuffledRight[matched[1]] === correctRight ? ' matched' : ' wrong-flash';
    }
    html += `<div class="ex-match-item${cls}" onclick="matchClick('${tid}',${qi},'l',${i})">${l}</div>`;
  });
  html += '</div><div>';
  (ans.shuffledRight||right).forEach((r,i) => {
    const matched = ans.pairs && ans.pairs.find(p => p[1] === i);
    let cls = matched ? ' matched' : (ans.selected === 'r'+i ? ' sel' : '');
    html += `<div class="ex-match-item${cls}" onclick="matchClick('${tid}',${qi},'r',${i})">${r}</div>`;
  });
  html += '</div></div>';
  return html;
}

function renderOrderExercise(ex, qi, tid, checked, ans){
  if(!ans) {
    const shuffled = [...ex.items].sort(() => Math.random() - 0.5);
    exerciseAnswers[tid][qi] = shuffled;
    ans = shuffled;
  }
  let html = '<div class="ex-order-list">';
  ans.forEach((item, i) => {
    let cls = '';
    if(checked) cls = item === ex.items[i] ? ' correct' : ' wrong';
    html += `<div class="ex-order-item${cls}"><span class="grip">☰</span> ${item}
      ${!checked ? `<span style="margin-left:auto;display:flex;gap:.2rem">
        <button class="sim-btn" onclick="orderMove('${tid}',${qi},${i},-1)" ${i===0?'disabled':''}>▲</button>
        <button class="sim-btn" onclick="orderMove('${tid}',${qi},${i},1)" ${i===ans.length-1?'disabled':''}>▼</button>
      </span>` : ''}
    </div>`;
  });
  html += '</div>';
  return html;
}

/* ── Exercise Handlers ── */
function pickMC(tid, qi, oi){
  if(exerciseChecked[tid]) return;
  exerciseAnswers[tid][qi] = oi;
  renderContent();
}
function pickTF(tid, qi, val){
  if(exerciseChecked[tid]) return;
  exerciseAnswers[tid][qi] = val;
  renderContent();
}
function fillInput(tid, qi){
  exerciseAnswers[tid][qi] = document.getElementById('fill-'+qi).value;
}
function calcInput(tid, qi){
  exerciseAnswers[tid][qi] = document.getElementById('calc-'+qi).value;
}
function matchClick(tid, qi, side, idx){
  if(exerciseChecked[tid]) return;
  const ans = exerciseAnswers[tid][qi];
  const key = side + idx;
  if(ans.selected === null || ans.selected === undefined){
    ans.selected = key;
  } else {
    const prev = ans.selected;
    if(prev[0] !== side[0]){ // different sides = make pair
      const li = side === 'l' ? idx : parseInt(prev.slice(1));
      const ri = side === 'r' ? idx : parseInt(prev.slice(1));
      if(!ans.pairs) ans.pairs = [];
      // Remove existing pairs for these indices
      ans.pairs = ans.pairs.filter(p => p[0] !== li && p[1] !== ri);
      ans.pairs.push([li, ri]);
    }
    ans.selected = null;
  }
  renderContent();
}
function orderMove(tid, qi, idx, dir){
  if(exerciseChecked[tid]) return;
  const arr = exerciseAnswers[tid][qi];
  const newIdx = idx + dir;
  if(newIdx < 0 || newIdx >= arr.length) return;
  [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
  renderContent();
}

function checkAnswer(ex, ans){
  if(ex.type === 'mc') return ans === ex.correct;
  if(ex.type === 'tf') return ans === ex.correct;
  if(ex.type === 'fill') return ex.answers.some(a => a.toLowerCase() === (ans||'').toLowerCase());
  if(ex.type === 'calc'){
    const num = parseFloat((ans||'').replace(',','.'));
    if(typeof ex.a === 'string') return (ans||'').trim() === ex.a;
    return Math.abs(num - ex.a) <= (ex.tol || 0.01);
  }
  if(ex.type === 'match'){
    if(!ans || !ans.pairs) return false;
    return ans.pairs.length === ex.pairs.length && ans.pairs.every(p => {
      const correctRight = ex.pairs[p[0]][1];
      return ans.shuffledRight[p[1]] === correctRight;
    });
  }
  if(ex.type === 'order'){
    return ans && ans.every((item,i) => item === ex.items[i]);
  }
  return false;
}

function calcScore(topic){
  const tid = topic.id;
  let correct = 0;
  topic.exercises.forEach((ex,qi) => {
    if(checkAnswer(ex, exerciseAnswers[tid][qi])) correct++;
  });
  return { correct, total: topic.exercises.length };
}

function checkExercises(tid){
  exerciseChecked[tid] = true;
  // Save progress
  const topic = TOPICS[currentSubject][currentTopic];
  const score = calcScore(topic);
  progress[tid] = progress[tid] || {};
  progress[tid].exercises = score;
  localStorage.setItem('intensiv-progress', JSON.stringify(progress));
  if(typeof debouncedCloudSave === 'function') debouncedCloudSave();
  renderContent();
}

function resetExercises(tid){
  exerciseAnswers[tid] = {};
  exerciseChecked[tid] = false;
  renderContent();
}

/* ═══════════════════════════════════════════════════════
   SIMULATIONS
   ═══════════════════════════════════════════════════════ */
function renderSimulation(topic, container){
  const sim = topic.simulation;
  if(!sim || sim.type === 'none'){ container.innerHTML = '<p style="text-align:center;color:var(--text2)">Keine Simulation f&uuml;r dieses Thema.</p>'; return; }

  if(sim.type === 'bubbleSort') initBubbleSort(container);
  else if(sim.type === 'hashing') initHashing(container);
  else if(sim.type === 'automaton') initAutomaton(container);
  else if(sim.type === 'cyk') initCYK(container);
  else if(sim.type === 'osi') initOSI(container);
  else if(sim.type === 'csma') initCSMA(container);
  else if(sim.type === 'subnet') initSubnetCalc(container);
  else if(sim.type === 'tcp') initTCPHandshake(container);
}

/* ── Bubble Sort Visualizer ── */
function initBubbleSort(container){
  let arr = [38,27,43,3,9,82,10,55,21,67];
  let step = 0, i = 0, pass = 0, sorted = 0, running = false, timer = null;

  function getColor(idx){
    if(idx >= arr.length - sorted) return 'var(--green)';
    return 'var(--accent)';
  }

  function renderBars(ci, cj, swapping){
    let bars = '';
    const mx = Math.max(...arr);
    arr.forEach((v,idx) => {
      let cls = idx >= arr.length - sorted ? ' sorted' : '';
      if(idx === ci || idx === cj) cls = swapping ? ' swapping' : ' comparing';
      if(idx >= arr.length - sorted) cls = ' sorted';
      bars += `<div class="bs-bar${cls}" style="height:${(v/mx)*140+10}px;background:${cls?'':getColor(idx)}"><span>${v}</span></div>`;
    });
    return bars;
  }

  container.innerHTML = `<div class="sim-container">
    <div class="sim-title">🔄 Bubble Sort Visualizer</div>
    <div class="sim-controls">
      <button class="sim-btn" id="bs-play" onclick="bsPlay()">▶ Play</button>
      <button class="sim-btn" onclick="bsStep()">⏭ Schritt</button>
      <button class="sim-btn" onclick="bsReset()">↻ Reset</button>
      <input class="sim-input" id="bs-input" value="${arr.join(',')}" placeholder="Zahlen mit Komma..." style="width:250px">
      <button class="sim-btn" onclick="bsSetArr()">Setzen</button>
    </div>
    <div class="bs-bars" id="bsBars">${renderBars(-1,-1,false)}</div>
    <div class="sim-log" id="bsLog">Bereit. Dr&uuml;cke Play oder Schritt.</div>
  </div>`;

  window.bsPlay = function(){
    if(running){ running=false; clearInterval(timer); document.getElementById('bs-play').textContent='▶ Play'; return; }
    running=true; document.getElementById('bs-play').textContent='⏸ Pause';
    timer = setInterval(()=>{ if(!bsDoStep()) { running=false; clearInterval(timer); document.getElementById('bs-play').textContent='▶ Play'; }}, 500);
  };
  window.bsStep = function(){ bsDoStep(); };
  window.bsReset = function(){
    running=false; clearInterval(timer);
    i=0; pass=0; sorted=0;
    document.getElementById('bsBars').innerHTML = renderBars(-1,-1,false);
    document.getElementById('bsLog').textContent = 'Reset. Bereit.';
    document.getElementById('bs-play').textContent = '▶ Play';
  };
  window.bsSetArr = function(){
    const val = document.getElementById('bs-input').value;
    arr = val.split(',').map(Number).filter(n=>!isNaN(n)&&n>0);
    if(arr.length<2) arr=[5,3,8,1,9,2];
    bsReset();
  };

  function bsDoStep(){
    if(sorted >= arr.length - 1) return false;
    if(i >= arr.length - 1 - pass){
      pass++; i=0; sorted++;
      if(sorted >= arr.length - 1){
        document.getElementById('bsBars').innerHTML = renderBars(-1,-1,false);
        document.getElementById('bsLog').textContent += '\n✓ Sortiert!';
        return false;
      }
      document.getElementById('bsLog').textContent += `\nDurchlauf ${pass+1}`;
    }
    const log = document.getElementById('bsLog');
    if(arr[i] > arr[i+1]){
      log.textContent += `\n${arr[i]} > ${arr[i+1]} → tauschen`;
      document.getElementById('bsBars').innerHTML = renderBars(i,i+1,true);
      [arr[i], arr[i+1]] = [arr[i+1], arr[i]];
      setTimeout(()=>{ document.getElementById('bsBars').innerHTML = renderBars(-1,-1,false); }, 250);
    } else {
      log.textContent += `\n${arr[i]} ≤ ${arr[i+1]} → ok`;
      document.getElementById('bsBars').innerHTML = renderBars(i,i+1,false);
      setTimeout(()=>{ document.getElementById('bsBars').innerHTML = renderBars(-1,-1,false); }, 250);
    }
    log.scrollTop = log.scrollHeight;
    i++;
    return true;
  }
}

/* ── Subnetting Calculator ── */
function initSubnetCalc(container){
  container.innerHTML = `<div class="sim-container">
    <div class="sim-title">🔢 Subnetting-Rechner</div>
    <div class="sn-form">
      <input class="sim-input" id="sn-ip" value="192.168.10.130" placeholder="IP-Adresse" style="width:100%">
      <span style="color:var(--text2);font-size:1.2rem">/</span>
      <input class="sim-input" id="sn-cidr" value="26" placeholder="CIDR" style="width:60px">
    </div>
    <div style="text-align:center;margin-bottom:1rem"><button class="ex-check-btn" onclick="snCalc()">Berechnen</button></div>
    <div id="sn-results"></div>
  </div>`;

  window.snCalc = function(){
    const ip = document.getElementById('sn-ip').value.trim();
    const cidr = parseInt(document.getElementById('sn-cidr').value);
    const parts = ip.split('.').map(Number);
    if(parts.length!==4||parts.some(p=>isNaN(p)||p<0||p>255)||isNaN(cidr)||cidr<0||cidr>32){
      document.getElementById('sn-results').innerHTML='<p style="color:var(--red)">Ung&uuml;ltige Eingabe!</p>'; return;
    }

    const ipNum = (parts[0]<<24)|(parts[1]<<16)|(parts[2]<<8)|parts[3];
    const mask = cidr===0?0:(0xFFFFFFFF<<(32-cidr))>>>0;
    const net = (ipNum & mask)>>>0;
    const bc = (net | ~mask)>>>0;
    const first = (net + 1)>>>0;
    const last = (bc - 1)>>>0;
    const hosts = Math.pow(2, 32-cidr) - 2;

    function toIP(n){ return [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.'); }
    function toBin(n){ return [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].map(o=>o.toString(2).padStart(8,'0')).join('.'); }

    const maskStr = toIP(mask);
    const netBin = toBin(net);
    const maskBin = toBin(mask);

    // Color the binary: network bits in cyan, host bits in amber
    let colorBin = '';
    const ipBin = toBin(ipNum).replace(/\./g,'');
    for(let b=0;b<32;b++){
      if(b>0&&b%8===0) colorBin+='.';
      colorBin += b<cidr ? `<span class="net">${ipBin[b]}</span>` : `<span class="host">${ipBin[b]}</span>`;
    }

    document.getElementById('sn-results').innerHTML = `
      <div class="sn-result">
        <div class="sn-result-item"><div class="label">Netz-ID</div><div class="val">${toIP(net)}</div></div>
        <div class="sn-result-item"><div class="label">Broadcast</div><div class="val">${toIP(bc)}</div></div>
        <div class="sn-result-item"><div class="label">Erster Host</div><div class="val">${toIP(first)}</div></div>
        <div class="sn-result-item"><div class="label">Letzter Host</div><div class="val">${toIP(last)}</div></div>
        <div class="sn-result-item"><div class="label">Subnetzmaske</div><div class="val">${maskStr}</div></div>
        <div class="sn-result-item"><div class="label">Nutzbare Hosts</div><div class="val">${hosts<0?0:hosts}</div></div>
      </div>
      <div class="sn-binary" style="margin-top:.8rem">
        <b>IP bin&auml;r:</b> ${colorBin}<br>
        <span style="color:var(--accent)">Netzanteil (${cidr} Bit)</span> | <span style="color:var(--amber)">Hostanteil (${32-cidr} Bit)</span>
      </div>`;
  };
  snCalc();
}

/* ── TCP 3-Way Handshake ── */
function initTCPHandshake(container){
  let step = 0;

  function renderTCP(){
    const arrows = [
      {y:60, dir:'right', label:'SYN (Seq=100)', show: step>=1},
      {y:110, dir:'left', label:'SYN-ACK (Seq=300, Ack=101)', show: step>=2},
      {y:160, dir:'right', label:'ACK (Seq=101, Ack=301)', show: step>=3},
    ];

    let arrowsHTML = arrows.map(a => {
      const isRight = a.dir === 'right';
      return `<div class="tcp-arrow${a.show?' show':''}" style="top:${a.y}px;flex-direction:${isRight?'row':'row-reverse'}">
        <span class="tip">${isRight?'':'◄'}</span>
        <span class="line"></span>
        <span class="label">${a.label}</span>
        <span class="line"></span>
        <span class="tip">${isRight?'►':''}</span>
      </div>`;
    }).join('');

    return `<div class="sim-container">
      <div class="sim-title">🤝 TCP 3-Way Handshake</div>
      <div class="sim-controls">
        <button class="sim-btn" onclick="tcpStep()">⏭ N&auml;chster Schritt</button>
        <button class="sim-btn" onclick="tcpReset()">↻ Reset</button>
        <span style="font-size:.65rem;color:var(--text2)">Schritt ${step}/3</span>
      </div>
      <div class="tcp-wrap">
        <div class="tcp-host"><div class="name">CLIENT</div>
          <div style="font-size:.5rem;color:var(--text2);margin-top:.3rem">${step>=1?'SYN_SENT':'CLOSED'}</div>
          <div style="font-size:.5rem;color:var(--text2);margin-top:.2rem">${step>=3?'ESTABLISHED':''}</div>
        </div>
        <div class="tcp-arrows">${arrowsHTML}</div>
        <div class="tcp-host"><div class="name">SERVER</div>
          <div style="font-size:.5rem;color:var(--text2);margin-top:.3rem">${step>=1?'LISTEN':'CLOSED'}</div>
          <div style="font-size:.5rem;color:var(--text2);margin-top:.2rem">${step>=2?'SYN_RCVD':''}</div>
          <div style="font-size:.5rem;color:var(--text2);margin-top:.2rem">${step>=3?'ESTABLISHED':''}</div>
        </div>
      </div>
      <div class="sim-log" id="tcpLog">${step===0?'Dr&uuml;cke "N&auml;chster Schritt" um den Handshake zu starten.':''}${step>=1?'1. Client sendet SYN mit Sequenznummer 100\n':''}${step>=2?'2. Server antwortet mit SYN-ACK (Seq=300, Ack=101)\n':''}${step>=3?'3. Client best&auml;tigt mit ACK (Seq=101, Ack=301)\n✓ Verbindung hergestellt!':''}</div>
    </div>`;
  }

  container.innerHTML = renderTCP();
  window.tcpStep = function(){ if(step<3) step++; container.innerHTML = renderTCP(); };
  window.tcpReset = function(){ step=0; container.innerHTML = renderTCP(); };
}

/* ── OSI Encapsulation Animation ── */
function initOSI(container){
  const layers = [
    {name:'7 Application',color:'#ef4444',header:'HTTP-Daten'},
    {name:'6 Presentation',color:'#fb923c',header:'Formatierung'},
    {name:'5 Session',color:'#eab308',header:'Session-ID'},
    {name:'4 Transport',color:'#22c55e',header:'TCP-Header (Port)'},
    {name:'3 Network',color:'#06b6d4',header:'IP-Header (IP-Adr.)'},
    {name:'2 Data Link',color:'#a78bfa',header:'ETH-Header (MAC)'},
    {name:'1 Physical',color:'#f472b6',header:'Bits → Kabel/Funk'},
  ];
  let activeLayer = -1, direction = 'down';

  function renderOSI(){
    let html = `<div class="sim-container">
      <div class="sim-title">🏢 OSI-Kapselung (Encapsulation)</div>
      <div class="sim-controls">
        <button class="sim-btn" onclick="osiStep()">⏭ N&auml;chster Schritt</button>
        <button class="sim-btn" onclick="osiReset()">↻ Reset</button>
        <button class="sim-btn" onclick="osiToggleDir()">${direction==='down'?'↓ Senden':'↑ Empfangen'}</button>
        <span style="font-size:.6rem;color:var(--text2)">${direction==='down'?'Encapsulation (Header hinzuf&uuml;gen)':'Decapsulation (Header entfernen)'}</span>
      </div>
      <div class="osi-stack">`;

    const order = direction === 'down' ? layers : [...layers].reverse();
    order.forEach((l,i) => {
      const realIdx = direction === 'down' ? i : layers.length-1-i;
      const isActive = realIdx === activeLayer;
      const headerVisible = direction === 'down' ? realIdx >= activeLayer && activeLayer >= 0 : realIdx <= activeLayer;
      html += `<div class="osi-layer${isActive?' active':''}" style="background:${l.color}18;border-color:${isActive?l.color:'transparent'}">
        <span style="color:${l.color};font-weight:600">${l.name}</span>
        <span class="osi-header${headerVisible?' show':''}" style="color:${l.color}">+ ${l.header}</span>
      </div>`;
    });

    html += '</div></div>';
    return html;
  }

  container.innerHTML = renderOSI();
  window.osiStep = function(){
    if(direction==='down'){ activeLayer++; if(activeLayer>=layers.length) activeLayer=layers.length-1; }
    else { if(activeLayer<0) activeLayer=layers.length-1; else activeLayer--; if(activeLayer<0) activeLayer=0; }
    container.innerHTML = renderOSI();
  };
  window.osiReset = function(){ activeLayer=-1; container.innerHTML = renderOSI(); };
  window.osiToggleDir = function(){ direction = direction==='down'?'up':'down'; activeLayer=-1; container.innerHTML = renderOSI(); };
}

/* ── DFA/NFA Automaton Simulator ── */
function initAutomaton(container){
  // Example DFA: accepts strings containing "01" over {0,1}
  const states = ['q₀','q₁','q₂'];
  const accepting = [2];
  const transitions = { 'q₀,0':'q₁','q₀,1':'q₀','q₁,0':'q₁','q₁,1':'q₂','q₂,0':'q₂','q₂,1':'q₂' };
  let input = '1001';
  let currentState = 0;
  let charIdx = -1;
  let running = false;
  let autoTimer = null;
  let result = null;

  function stateX(i){ return 80 + i * 140; }
  const stateY = 100;

  function renderAuto(){
    // SVG for states
    let svg = `<svg class="auto-svg" viewBox="0 0 500 200">
      <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="var(--text2)"/></marker>
      <marker id="arrowActive" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="var(--accent)"/></marker></defs>`;

    // Start arrow
    svg += `<line x1="20" y1="${stateY}" x2="50" y2="${stateY}" stroke="var(--text2)" stroke-width="1.5" marker-end="url(#arrowhead)"/>`;

    // Edges
    const edges = [
      {from:0,to:1,label:'0',curve:0},
      {from:0,to:0,label:'1',loop:true},
      {from:1,to:1,label:'0',loop:true},
      {from:1,to:2,label:'1',curve:0},
      {from:2,to:2,label:'0,1',loop:true},
    ];

    edges.forEach(e => {
      const activeKey1 = charIdx >= 0 && charIdx < input.length ? `${states[currentState]},${input[charIdx]}` : '';
      if(e.loop){
        const cx = stateX(e.from), cy = stateY;
        const isActive = transitions[activeKey1] === states[e.from] && currentState === e.from;
        svg += `<path d="M${cx-15},${cy-30} C${cx-30},${cy-70} ${cx+30},${cy-70} ${cx+15},${cy-30}" class="auto-edge${isActive?' active':''}" ${isActive?'marker-end="url(#arrowActive)"':'marker-end="url(#arrowhead)"'}/>`;
        svg += `<text x="${cx}" y="${cy-55}" class="auto-edge-label">${e.label}</text>`;
      } else {
        const x1=stateX(e.from)+30, y1=stateY, x2=stateX(e.to)-30, y2=stateY;
        const isActive = activeKey1 && transitions[activeKey1] === states[e.to] && currentState === e.from;
        svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" class="auto-edge${isActive?' active':''}" ${isActive?'marker-end="url(#arrowActive)"':'marker-end="url(#arrowhead)"'}/>`;
        svg += `<text x="${(x1+x2)/2}" y="${y1-10}" class="auto-edge-label">${e.label}</text>`;
      }
    });

    // States
    states.forEach((s,i) => {
      const isAccepting = accepting.includes(i);
      const isActive = i === currentState;
      svg += `<circle cx="${stateX(i)}" cy="${stateY}" r="28" class="auto-state${isActive?' active':''}"/>`;
      if(isAccepting) svg += `<circle cx="${stateX(i)}" cy="${stateY}" r="23" fill="none" stroke="${isActive?'var(--accent)':'var(--border)'}" stroke-width="1.5"/>`;
      svg += `<text x="${stateX(i)}" y="${stateY}" class="auto-label" ${isActive?'fill="var(--accent)"':''}>${s}</text>`;
    });

    svg += '</svg>';

    // Input display
    let inputDisp = '';
    for(let c=0;c<input.length;c++){
      let cls = c < charIdx ? 'processed' : (c === charIdx ? 'current' : '');
      inputDisp += `<span class="auto-input-char ${cls}">${input[c]}</span>`;
    }

    let resultText = '';
    if(result !== null) resultText = result ? '<span style="color:var(--green)">✓ Akzeptiert!</span>' : '<span style="color:var(--red)">✗ Abgelehnt!</span>';

    container.innerHTML = `<div class="sim-container">
      <div class="sim-title">🤖 DFA-Simulator — Akzeptiert Strings mit "01"</div>
      <div class="sim-controls">
        <input class="sim-input" id="auto-input" value="${input}" placeholder="Eingabe..." style="width:150px">
        <button class="sim-btn" onclick="autoSet()">Setzen</button>
        <button class="sim-btn" onclick="autoStep()">⏭ Schritt</button>
        <button class="sim-btn" id="auto-play" onclick="autoPlay()">▶ Play</button>
        <button class="sim-btn" onclick="autoReset()">↻ Reset</button>
      </div>
      ${svg}
      <div style="text-align:center;margin:.6rem 0">${inputDisp} ${resultText}</div>
      <div class="sim-log" id="autoLog">Zustand: ${states[currentState]} ${charIdx>=0?'| Zeichen: '+input[charIdx]:''}</div>
    </div>`;
  }

  renderAuto();

  window.autoSet = function(){ input = document.getElementById('auto-input').value || '01'; autoReset(); };
  window.autoReset = function(){ currentState=0; charIdx=-1; result=null; running=false; clearInterval(autoTimer); renderAuto(); };
  window.autoStep = function(){
    if(result !== null) return;
    charIdx++;
    if(charIdx >= input.length){
      result = accepting.includes(currentState);
      renderAuto();
      return;
    }
    const key = `${states[currentState]},${input[charIdx]}`;
    const next = transitions[key];
    if(next){
      const nextIdx = states.indexOf(next);
      const log = document.getElementById('autoLog');
      currentState = nextIdx;
    }
    renderAuto();
    if(charIdx === input.length - 1){
      setTimeout(()=>{ charIdx++; result = accepting.includes(currentState); renderAuto(); }, 600);
    }
  };
  window.autoPlay = function(){
    if(running){ running=false; clearInterval(autoTimer); return; }
    running=true;
    autoTimer = setInterval(()=>{
      if(result!==null){ running=false; clearInterval(autoTimer); return; }
      autoStep();
    }, 700);
  };
}

/* ── CYK Stepper ── */
function initCYK(container){
  container.innerHTML = `<div class="sim-container">
    <div class="sim-title">📝 CYK-Algorithmus (Demo)</div>
    <div class="concept tip" style="margin-bottom:.8rem">
      <div class="concept-label">GRAMMATIK (CNF)</div>
      <p style="font-family:'JetBrains Mono',monospace;font-size:.75rem">
        S → AB | a<br>A → a<br>B → b<br>
      </p>
    </div>
    <div class="sim-controls">
      <span style="font-size:.7rem;color:var(--text2)">Wort:</span>
      <input class="sim-input" id="cyk-word" value="ab" placeholder="Wort eingeben" style="width:100px">
      <button class="sim-btn" onclick="cykRun()">▶ Berechnen</button>
    </div>
    <div id="cyk-result" style="margin-top:.8rem"></div>
  </div>`;

  window.cykRun = function(){
    const word = document.getElementById('cyk-word').value.trim();
    if(!word || !/^[ab]+$/.test(word)){ document.getElementById('cyk-result').innerHTML='<p style="color:var(--red)">Nur a und b erlaubt!</p>'; return; }

    const n = word.length;
    const table = Array.from({length:n}, ()=> Array.from({length:n}, ()=> new Set()));

    // Fill diagonal (length 1)
    for(let i=0;i<n;i++){
      if(word[i]==='a'){ table[i][i].add('A'); table[i][i].add('S'); }
      if(word[i]==='b'){ table[i][i].add('B'); }
    }

    // Fill upper triangle
    for(let len=2;len<=n;len++){
      for(let i=0;i<=n-len;i++){
        const j=i+len-1;
        for(let k=i;k<j;k++){
          // Check S → AB
          if(table[i][k].has('A') && table[k+1][j].has('B')) table[i][j].add('S');
        }
      }
    }

    // Render table
    let html = '<div style="overflow-x:auto"><table class="data-table" style="text-align:center">';
    html += '<thead><tr><th></th>';
    for(let j=0;j<n;j++) html += `<th>${word[j]}</th>`;
    html += '</tr></thead><tbody>';
    for(let len=1;len<=n;len++){
      html += `<tr><td style="color:var(--text2);font-size:.6rem">Len ${len}</td>`;
      for(let i=0;i<n;i++){
        const j = i+len-1;
        if(j<n){
          const vals = [...table[i][j]].join(',');
          const hasS = table[i][j].has('S') && len===n;
          html += `<td style="${hasS?'color:var(--green);font-weight:700':'color:var(--accent)'}">{${vals||'∅'}}</td>`;
        } else {
          html += '<td></td>';
        }
      }
      html += '</tr>';
    }
    html += '</tbody></table></div>';

    const accepted = table[0][n-1].has('S');
    html += `<div style="text-align:center;margin-top:.5rem;font-weight:600;color:${accepted?'var(--green)':'var(--red)'}">${accepted?'✓ S ∈ T[1][n] → Wort akzeptiert!':'✗ S ∉ T[1][n] → Wort nicht in L(G)'}</div>`;

    document.getElementById('cyk-result').innerHTML = html;
  };
}

const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhoZWRwaXJxZHhhcmpreGJ5Z3dmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTUzNDcsImV4cCI6MjA4OTY3MTM0N30.qe0mvET4aLjHloGmdIukjWsiKi9c8Edh2Ar77MVYeP0';
let sb, currentUser = null;
try { sb = window.supabase.createClient(SB_URL, SB_KEY); } catch(e){ console.warn('Supabase init failed'); }

function renderAuthBar(){
  const bar = document.getElementById('authBar');
  if(!bar) return;
  if(currentUser){
    bar.innerHTML = `<span class="user-name">👤 ${currentUser.email.split('@')[0]}</span>
      <button onclick="forceCloudLoad()">☁ Cloud laden</button>
      <button onclick="doLogout()">Logout</button>`;
  } else {
    bar.innerHTML = `<button onclick="showAuthModal()">🔐 Anmelden f&uuml;r Cloud-Sync</button>`;
  }
}

function showAuthModal(){
  let overlay = document.getElementById('authOverlay');
  if(!overlay){
    overlay = document.createElement('div');
    overlay.id = 'authOverlay';
    overlay.className = 'auth-overlay';
    overlay.innerHTML = `<div class="auth-modal">
      <h3>Anmelden / Registrieren</h3>
      <input id="authEmail" type="email" placeholder="E-Mail">
      <input id="authPass" type="password" placeholder="Passwort">
      <div class="auth-btns">
        <button onclick="doLogin()">Login</button>
        <button onclick="doSignup()">Registrieren</button>
      </div>
      <button onclick="this.closest('.auth-overlay').classList.remove('show')" style="margin-top:.5rem;background:none;border:none;color:var(--text2);cursor:pointer;font-size:.7rem;width:100%;text-align:center">Abbrechen</button>
    </div>`;
    document.body.appendChild(overlay);
  }
  overlay.classList.add('show');
}

async function doLogin(){
  const email = document.getElementById('authEmail').value;
  const pass = document.getElementById('authPass').value;
  const {data,error} = await sb.auth.signInWithPassword({email,password:pass});
  if(error){ showToast('Login fehlgeschlagen: '+error.message); return; }
  currentUser = data.user;
  document.getElementById('authOverlay').classList.remove('show');
  renderAuthBar();
  loadFromCloud();
  showToast('Angemeldet!');
}

async function doSignup(){
  const email = document.getElementById('authEmail').value;
  const pass = document.getElementById('authPass').value;
  const {data,error} = await sb.auth.signUp({email,password:pass});
  if(error){ showToast('Registrierung fehlgeschlagen: '+error.message); return; }
  currentUser = data.user;
  document.getElementById('authOverlay').classList.remove('show');
  renderAuthBar();
  showToast('Registriert und angemeldet!');
}

async function doLogout(){
  await sb.auth.signOut();
  currentUser = null;
  renderAuthBar();
  showToast('Abgemeldet.');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2500);
}

async function saveToCloud(){
  if(!currentUser || !sb) return;
  try{
    await sb.from('intensiv_progress').upsert({
      user_id: currentUser.id,
      progress: JSON.stringify(progress),
      updated_at: new Date().toISOString()
    }, {onConflict:'user_id'});
  } catch(e){ console.warn('Cloud save error', e); }
}

let _cloudSaveTimer = null;
function debouncedCloudSave(){
  clearTimeout(_cloudSaveTimer);
  _cloudSaveTimer = setTimeout(saveToCloud, 1500);
}

async function loadFromCloud(){
  if(!currentUser || !sb) return;
  try{
    const {data} = await sb.from('intensiv_progress').select('progress').eq('user_id', currentUser.id).maybeSingle();
    if(data && data.progress){
      const cloud = JSON.parse(data.progress);
      // Smart merge: keep better scores
      Object.keys(cloud).forEach(k => {
        if(!progress[k]) { progress[k] = cloud[k]; return; }
        if(cloud[k].exercises && (!progress[k].exercises || cloud[k].exercises.correct > progress[k].exercises.correct)){
          progress[k].exercises = cloud[k].exercises;
        }
      });
      localStorage.setItem('intensiv-progress', JSON.stringify(progress));
      showToast('Cloud-Daten geladen!');
    }
  } catch(e){ console.warn('Cloud load error', e); }
}

async function forceCloudLoad(){
  if(!currentUser || !sb) return;
  try{
    const {data} = await sb.from('intensiv_progress').select('progress').eq('user_id', currentUser.id).maybeSingle();
    if(data && data.progress){
      progress = JSON.parse(data.progress);
      localStorage.setItem('intensiv-progress', JSON.stringify(progress));
      showToast('Cloud-Daten &uuml;bernommen!');
    }
  } catch(e){ showToast('Fehler beim Laden.'); }
}

/* ═══════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════ */
async function initAuth(){
  if(!sb) return;
  const {data} = await sb.auth.getSession();
  if(data.session){ currentUser = data.session.user; loadFromCloud(); }
  renderAuthBar();
}

initAuth();
render();
</script>
