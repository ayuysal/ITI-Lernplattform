<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lernlandkarte – Visuelles Lernen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0e11;--surface:#18171d;--border:#1e2230;
  --text:#e2e4ea;--muted:#6b7084;
  --amber:#f5c542;--teal:#5ec4b6;
  --c-netz:#06b6d4;--c-sig:#a78bfa;--c-tcp:#fb923c;--c-info:#22c55e;--c-formal:#f472b6;
  --radius:12px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;line-height:1.5}

/* Noise overlay */
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}

a{color:inherit;text-decoration:none}

/* Back link */
.back{display:inline-block;padding:0.6rem 0;margin:0.8rem 1.5rem;font-size:.85rem;color:var(--muted);transition:color .2s}
.back:hover{color:var(--text)}

/* Header */
header{text-align:center;padding:0.5rem 1.5rem 1.2rem}
header .tag{font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.12em;color:var(--amber);text-transform:uppercase}
header h1{font-family:'Outfit',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;margin:.3rem 0}
header p{color:var(--muted);font-size:.9rem;max-width:600px;margin:0 auto}

/* Toolbar */
.toolbar{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;align-items:center;padding:.8rem 1.5rem;max-width:1000px;margin:0 auto}
.toolbar .search{flex:1;min-width:200px;max-width:320px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.55rem .9rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;transition:border-color .2s}
.toolbar .search:focus{border-color:var(--amber)}
.filter-group{display:flex;gap:.3rem;align-items:center}
.filter-group .label{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-right:.2rem}
.fbtn{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.3rem .55rem;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.65rem;cursor:pointer;transition:all .2s}
.fbtn:hover{border-color:var(--text);color:var(--text)}
.fbtn.active{border-color:var(--amber);color:var(--amber);background:rgba(245,197,66,.08)}

/* SVG overlay */
.svg-layer{position:absolute;inset:0;pointer-events:none;z-index:1}
.svg-layer line{stroke:rgba(255,255,255,.06);stroke-width:1.5;transition:stroke .3s,opacity .3s}
.svg-layer line.highlight{stroke-width:2;opacity:1}

/* Main canvas */
.canvas{position:relative;max-width:1200px;margin:1rem auto;padding:0 1rem}

/* Domain grid */
.islands{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;position:relative;z-index:2}
.island:nth-child(3){grid-column:1/-1}

/* Island */
.island{border-radius:16px;padding:1.2rem;position:relative;overflow:hidden}
.island::before{content:'';position:absolute;inset:0;border-radius:16px;pointer-events:none}
.island[data-domain="netz"]{background:radial-gradient(ellipse at 30% 30%,rgba(6,182,212,.08),transparent 70%)}
.island[data-domain="sig"]{background:radial-gradient(ellipse at 70% 30%,rgba(167,139,250,.08),transparent 70%)}
.island[data-domain="tcp"]{background:radial-gradient(ellipse at 50% 50%,rgba(251,146,60,.08),transparent 70%)}
.island[data-domain="info"]{background:radial-gradient(ellipse at 30% 70%,rgba(34,197,94,.08),transparent 70%)}
.island[data-domain="formal"]{background:radial-gradient(ellipse at 70% 70%,rgba(244,114,182,.08),transparent 70%)}

.island-header{display:flex;align-items:center;gap:.7rem;margin-bottom:.8rem;padding-bottom:.6rem;border-bottom:1px solid var(--border)}
.island-icon{font-size:1.5rem}
.island-title{font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:700}
.island-sub{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:.04em}
.island-stats{margin-left:auto;text-align:right;font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted)}

/* Topic cards */
.topics{display:flex;flex-wrap:wrap;gap:.7rem}
.topic-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.8rem;width:calc(50% - .35rem);position:relative;cursor:pointer;transition:all .25s;border-top:3px solid var(--card-color)}
.topic-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3);border-color:color-mix(in srgb,var(--card-color) 40%,var(--border))}
.topic-card.learned{border-color:rgba(34,197,94,.3)}
.topic-card.learned .check-btn{color:var(--c-info);opacity:1}
.topic-card.hidden{display:none}

.card-top{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.4rem}
.card-emoji{font-size:1.1rem;line-height:1.2}
.card-title{font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:600;flex:1;line-height:1.3}
.card-heft{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--muted)}

/* Badges */
.badges{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.3rem}
.badge{display:inline-flex;align-items:center;gap:.25rem;font-family:'JetBrains Mono',monospace;font-size:.58rem;padding:.15rem .4rem;border-radius:4px;white-space:nowrap}
.badge-complexity{background:rgba(0,0,0,.3)}
.badge-time{background:rgba(94,196,182,.08);color:var(--teal)}
.complexity-dots{display:inline-flex;gap:2px}
.complexity-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--border)}
.complexity-dots span.filled{background:var(--dot-color)}

/* Complexity labels */
.clabel-1{color:#22c55e} .clabel-2{color:#06b6d4} .clabel-3{color:#f5c542} .clabel-4{color:#fb923c} .clabel-5{color:#f472b6}

/* Check button */
.check-btn{position:absolute;top:.5rem;right:.5rem;background:none;border:none;color:var(--border);font-size:.9rem;cursor:pointer;opacity:.5;transition:all .2s;padding:2px}
.check-btn:hover{color:var(--c-info);opacity:1}

/* Expanded content */
.card-expand{display:none;margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border)}
.topic-card.expanded .card-expand{display:block}

.visual-box{background:#0c0b0f;border:1px solid rgba(245,197,66,.15);border-radius:6px;padding:.6rem .7rem;margin-bottom:.5rem;overflow:hidden}

/* Exam relevance badge */
.badge-exam{background:rgba(245,197,66,.1);color:var(--amber)}
.badge-exam.hot{background:rgba(239,68,68,.12);color:#ef4444}
.badge-exam.warm{background:rgba(251,146,60,.1);color:#fb923c}
.badge-exam.mild{background:rgba(94,196,182,.08);color:var(--teal)}
/* Learn type badge */
.badge-type{background:rgba(167,139,250,.08);color:#a78bfa}

/* Memorize list */
.memo-box{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);border-radius:6px;padding:.4rem .6rem;margin-bottom:.5rem;font-size:.7rem}
.memo-box .memo-title{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:#ef4444;margin-bottom:.25rem;text-transform:uppercase;letter-spacing:.05em}
.memo-box li{list-style:none;padding-left:.7rem;position:relative;color:var(--muted);line-height:1.6;font-size:.68rem}
.memo-box li::before{content:'!';position:absolute;left:0;color:#ef4444;font-weight:700;font-size:.6rem}

/* ── VISUAL DIAGRAM SYSTEM ── */
.vis-layers{display:flex;flex-direction:column;gap:2px}
.vis-layer{display:flex;align-items:center;gap:.5rem;padding:.25rem .5rem;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:.62rem;border-left:3px solid var(--lc,var(--amber))}
.vis-layer .vis-num{font-weight:700;min-width:14px;color:var(--lc,var(--amber))}
.vis-layer .vis-tag{margin-left:auto;font-size:.55rem;opacity:.6;color:var(--lc)}

.vis-flow{display:flex;flex-wrap:wrap;align-items:center;gap:.3rem;justify-content:center}
.vis-node{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:5px;padding:.2rem .45rem;font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--text);text-align:center;white-space:nowrap}
.vis-node.accent{border-color:var(--nc,var(--amber));color:var(--nc,var(--amber));background:rgba(245,197,66,.08)}
.vis-arrow{color:var(--amber);font-size:.75rem;font-family:'JetBrains Mono',monospace}
.vis-arrow.down{display:block;text-align:center;font-size:.65rem;color:var(--muted);line-height:1}

.vis-formula{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--amber);line-height:1.8;padding:.1rem 0}
.vis-formula .hi{color:#ef4444;font-weight:700}
.vis-formula .lo{color:var(--teal)}
.vis-formula .sub{font-size:.55rem;color:var(--muted)}
.vis-formula div{padding:.05rem 0}

.vis-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.vis-grid.cols3{grid-template-columns:1fr 1fr 1fr}
.vis-cell{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:.2rem .35rem;font-family:'JetBrains Mono',monospace;font-size:.58rem;text-align:center;color:var(--muted)}
.vis-cell.hi{border-color:var(--amber);color:var(--amber);background:rgba(245,197,66,.06)}

.vis-compare{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.vis-side{border:1px solid rgba(255,255,255,.08);border-radius:5px;padding:.3rem .4rem}
.vis-side-title{font-family:'JetBrains Mono',monospace;font-size:.58rem;font-weight:700;margin-bottom:.2rem;color:var(--nc,var(--amber))}
.vis-side-item{font-family:'JetBrains Mono',monospace;font-size:.56rem;color:var(--muted);line-height:1.6}

.vis-tree{padding-left:.2rem}
.vis-branch{padding-left:.8rem;border-left:2px solid rgba(255,255,255,.08);margin:.1rem 0}
.vis-leaf{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);padding:.1rem 0;position:relative}
.vis-leaf::before{content:'─';position:absolute;left:-.8rem;color:rgba(255,255,255,.15)}
.vis-leaf.root{border:none;padding-left:0;font-weight:600;color:var(--amber);font-size:.65rem}
.vis-leaf.root::before{content:none}
.keywords{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.5rem}
.kw{font-family:'JetBrains Mono',monospace;font-size:.55rem;padding:.12rem .35rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:4px;color:var(--muted)}
.concepts-list{font-size:.75rem;color:var(--muted);line-height:1.7}
.concepts-list li{list-style:none;padding-left:.8rem;position:relative}
.concepts-list li::before{content:'›';position:absolute;left:0;color:var(--card-color)}
.heft-link{display:inline-block;margin-top:.4rem;font-family:'JetBrains Mono',monospace;font-size:.6rem;padding:.25rem .6rem;border-radius:4px;border:1px solid var(--card-color);color:var(--card-color);transition:all .2s}
.heft-link:hover{background:var(--card-color);color:#000}

/* Stat bar */
.stat-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,14,17,.92);backdrop-filter:blur(8px);border-top:1px solid var(--border);padding:.5rem 1.5rem;display:flex;justify-content:center;gap:1.5rem;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted);z-index:100}
.stat-bar .val{color:var(--amber)}

/* Legend */
.legend{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;padding:.4rem 1rem;margin-bottom:.3rem}
.legend-item{display:flex;align-items:center;gap:.3rem;font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);cursor:pointer;transition:opacity .2s;padding:.2rem .4rem;border-radius:4px}
.legend-item:hover{background:rgba(255,255,255,.04)}
.legend-item.dimmed{opacity:.3}
.legend-dot{width:8px;height:8px;border-radius:50%}

/* Responsive */
@media(max-width:900px){
  .islands{grid-template-columns:1fr}
  .island:nth-child(3){grid-column:auto}
  .topic-card{width:100%}
}
@media(max-width:600px){
  .toolbar{padding:.5rem .8rem}
  .island{padding:.8rem}
  .card-title{font-size:.78rem}
}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
body{padding-bottom:3rem}
</style>
</head>

<header>

<div class="toolbar">

  <div class="filter-group">
    <span class="label">Level</span>
    <button class="fbtn active" data-c="0" onclick="toggleComplexity(0)">Alle</button>

</div>

<div class="legend" id="legend"></div>

<div class="canvas">
  <svg class="svg-layer" id="svgLayer"></svg>
  <div class="islands" id="islands"></div>
</div>

<div class="stat-bar" id="statBar"></div>

<script>
/* ── DATA ─────────────────────────────────────────── */
const DOMAINS = [
  {
    id:'netz', emoji:'🌐', title:'Netzwerk-Grundlagen', sub:'ITI21 · 6 Kapitel',
    color:'#06b6d4',
    topics:[
      {id:'netz-internet',emoji:'🏛️',title:'Internet & Organisation',heft:'hefte/iti21.html',complexity:2,time:30,
        exam:0,examLabel:'Selten',learnType:'konzept',memorize:[],
        visualHTML:`<div class="vis-tree"><div class="vis-leaf root">🌍 Internet-Hierarchie</div><div class="vis-branch"><div class="vis-leaf" style="color:var(--amber)">Tier-1 — Backbone (DE-CIX)</div><div class="vis-branch"><div class="vis-leaf">Tier-2 — Regional ISP</div><div class="vis-branch"><div class="vis-leaf">Tier-3 — Access/Endkunde</div></div></div></div></div><div class="vis-flow" style="margin-top:.4rem"><div class="vis-node accent">IANA</div><div class="vis-arrow">→</div><div class="vis-node">IETF</div><div class="vis-arrow">→</div><div class="vis-node">RFC</div><div class="vis-arrow">→</div><div class="vis-node accent">Standard</div></div>`,

        concepts:['IuK-Technologien','Internet-Hierarchie','Standardisierung (IETF, IEEE, ISO)']},
      {id:'netz-grundlagen',emoji:'🔗',title:'Computernetz-Grundlagen',heft:'hefte/iti21.html',complexity:1,time:20,
        exam:0,examLabel:'Selten',learnType:'konzept',memorize:[],
        visualHTML:`<div class="vis-flow"><div class="vis-node accent" style="--nc:#06b6d4">Rechner A</div><div class="vis-arrow">⇄</div><div class="vis-node accent" style="--nc:#06b6d4">Rechner B</div></div><div class="vis-grid cols3" style="margin-top:.4rem"><div class="vis-cell hi">Kommunikation</div><div class="vis-cell hi">Ressourcen</div><div class="vis-cell hi">Last</div><div class="vis-cell">Verfügbarkeit</div><div class="vis-cell">Leistung</div><div class="vis-cell">Daten</div><div class="vis-cell">Kosten</div><div class="vis-cell">Sicherheit</div><div class="vis-cell">Funktions-V.</div></div>`,

      {id:'netz-topo',emoji:'📐',title:'Topologien & Klassifikation',heft:'hefte/iti21.html',complexity:2,time:45,
        exam:2,examLabel:'Gelegentlich',learnType:'kombiniert',memorize:['Topologie-Typen: Stern, Bus, Ring, Mesh, Baum','Netzreichweiten: PAN < LAN < MAN < WAN < GAN'],

        keywords:['PAN','LAN','MAN','WAN','Stern','Bus','Ring','Mesh','Unicast','Broadcast'],
        concepts:['Netzreichweiten (PAN→GAN)','Topologien','Vermittlungsarten','Kommunikationsarten','Duplex-Modi']},
      {id:'netz-kenn',emoji:'📏',title:'Kenngrößen',heft:'hefte/iti21.html',complexity:3,time:45,
        exam:2,examLabel:'Gelegentlich',learnType:'kombiniert',memorize:['Latenz = t_v + t_w + t_Ü + t_a','t_Ü = D/b (Daten/Bitrate)','t_a = d/v (Strecke/Ausbreitungsgeschw.)','Übertragungsrate: Basis 10 (kbit=1000)'],
        visualHTML:`<div class="vis-formula"><div><span class="hi">Latenz</span> = t<sub>v</sub> + t<sub>w</sub> + t<sub>Ü</sub> + t<sub>a</sub></div><div class="sub">Verarbeitung + Warteschlange + Übertragung + Ausbreitung</div><div style="margin-top:.3rem"><span class="lo">t<sub>Ü</sub></span> = D / b <span class="sub">(Datenmenge / Bitrate)</span></div><div><span class="lo">t<sub>a</sub></span> = d / v <span class="sub">(Entfernung / Geschw.)</span></div><div style="margin-top:.3rem"><span class="hi">b</span> = D / t <span class="sub">[bit/s] – Basis 10!</span></div></div>`,
        keywords:['Latenz','Jitter','Durchsatz','Übertragungsrate','Propagation'],
        concepts:['Übertragungsrate b','4 Latenz-Komponenten','Jitter & Paketverlust','BDP (Bandwidth-Delay Product)']},
      {id:'netz-osi',emoji:'📊',title:'OSI- & TCP/IP-Modell',heft:'hefte/iti21.html',complexity:3,time:60,

        visualHTML:`<div class="vis-layers"><div class="vis-layer" style="--lc:#f472b6;background:rgba(244,114,182,.08)"><span class="vis-num">7</span> Application <span class="vis-tag">┐</span></div><div class="vis-layer" style="--lc:#f472b6;background:rgba(244,114,182,.06)"><span class="vis-num">6</span> Presentation <span class="vis-tag">├→ Application</span></div><div class="vis-layer" style="--lc:#f472b6;background:rgba(244,114,182,.04)"><span class="vis-num">5</span> Session <span class="vis-tag">┘</span></div><div class="vis-layer" style="--lc:#fb923c;background:rgba(251,146,60,.08)"><span class="vis-num">4</span> Transport <span class="vis-tag">→ Transport</span></div><div class="vis-layer" style="--lc:#f5c542;background:rgba(245,197,66,.08)"><span class="vis-num">3</span> Network <span class="vis-tag">→ Internet</span></div><div class="vis-layer" style="--lc:#06b6d4;background:rgba(6,182,212,.08)"><span class="vis-num">2</span> Data Link <span class="vis-tag">┐</span></div><div class="vis-layer" style="--lc:#06b6d4;background:rgba(6,182,212,.05)"><span class="vis-num">1</span> Physical <span class="vis-tag">┘→ Net Access</span></div></div>`,
        keywords:['OSI','TCP/IP','PDU','Kapselung','Schichtenmodell'],
        concepts:['7 OSI-Schichten','4 TCP/IP-Schichten','PDU-Bezeichnungen','Kapselung/Entkapselung']}
    ]
  },
  {
    id:'sig', emoji:'📡', title:'Signale & Übertragung', sub:'ITI22+ITI23 · 11 Kapitel',

function formatTime(min){
  if(min < 60) return `~${min} Min`;
  const h = Math.floor(min/60), m = min%60;
  return m ? `~${h}h ${m}m` : `~${h}h`;
}

function renderDots(level){
  let html = '<span class="complexity-dots">';
  for(let i=1;i<=5;i++) html += `<span${i<=level?' class="filled" style="background:'+dotColors[level]+'"':''}></span>`;
  return html+'</span>';
}

function renderIslands(){
  const el = document.getElementById('islands');
  el.innerHTML = '';
  DOMAINS.forEach(d=>{
    const island = document.createElement('div');
    island.className = 'island';
    island.dataset.domain = d.id;
    const topicCount = d.topics.length;
    const totalTime = d.topics.reduce((s,t)=>s+t.time,0);
    island.innerHTML = `
      <div class="island-header">
        <span class="island-icon">${d.emoji}</span>
        <div>
          <div class="island-title" style="color:${d.color}">${d.title}</div>
          <div class="island-sub">${d.sub}</div>
        </div>
        <div class="island-stats">${topicCount} Themen<br>${formatTime(totalTime)}</div>
      </div>
      <div class="topics">${d.topics.map(t=>renderCard(t,d.color)).join('')}</div>
    `;
    el.appendChild(island);
  });
}

function renderCard(t, color){
  const isLearned = learned[t.id];
  const memoHTML = t.memorize && t.memorize.length ? `<div class="memo-box"><div class="memo-title">🧠 Auswendig lernen</div><ul>${t.memorize.map(m=>`<li>${m}</li>`).join('')}</ul></div>` : '';
  return `
    <div class="topic-card${isLearned?' learned':''}" id="card-${t.id}" style="--card-color:${color}"
         data-id="${t.id}" data-complexity="${t.complexity}" data-time="${t.time}" data-exam="${t.exam||0}"
         data-search="${(t.title+' '+t.keywords.join(' ')).toLowerCase()}"
         onclick="toggleCard(this)" onmouseenter="highlightConnections('${t.id}')" onmouseleave="clearConnections()">
      <button class="check-btn" onclick="event.stopPropagation();toggleLearned('${t.id}',this)" title="Als gelernt markieren">
        ${isLearned?'✅':'☐'}
      </button>
      <div class="card-top">
        <span class="card-emoji">${t.emoji}</span>
        <div>
          <div class="card-title">${t.title}</div>
          <div class="card-heft">${t.heft.replace('hefte/','').replace('.html','').toUpperCase()}</div>
        </div>
      </div>
      <div class="badges">
        <span class="badge badge-complexity">${renderDots(t.complexity)} <span class="clabel-${t.complexity}">${complexityLabels[t.complexity]}</span></span>
        <span class="badge badge-time">⏱ ${formatTime(t.time)}</span>
        ${t.examLabel&&t.examLabel!=='Selten'?`<span class="badge badge-exam ${examClass[t.examLabel]}">${examIcons[t.examLabel]} ${t.examLabel}</span>`:''}
        <span class="badge badge-type">${typeIcons[t.learnType]} ${typeLabels[t.learnType]}</span>
      </div>
      <div class="card-expand">
        <div class="visual-box">${t.visualHTML||''}</div>
        ${memoHTML}
        <div class="keywords">${t.keywords.map(k=>`<span class="kw">${k}</span>`).join('')}</div>
        <ul class="concepts-list">${t.concepts.map(c=>`<li>${c}</li>`).join('')}</ul>
        <a href="${t.heft}" target="_blank" class="heft-link" onclick="event.stopPropagation()">Heft öffnen →</a>
      </div>
    </div>
  `;
}

function renderLegend(){
  const el = document.getElementById('legend');
  el.innerHTML = DOMAINS.map(d=>`
    <div class="legend-item${activeDomains.has(d.id)?'':' dimmed'}" data-domain="${d.id}" onclick="toggleDomain('${d.id}')">
      <span class="legend-dot" style="background:${d.color}"></span>${d.title.split(' ')[0]}
    </div>
  `).join('');
}

/* ── INTERACTIONS ─────────────────────────────────── */
function toggleCard(el){
  const wasExpanded = el.classList.contains('expanded');
  document.querySelectorAll('.topic-card.expanded').forEach(c=>c.classList.remove('expanded'));
  if(!wasExpanded) el.classList.add('expanded');
  requestAnimationFrame(drawConnections);
}

function toggleLearned(id, btn){
  learned[id] = !learned[id];
  if(!learned[id]) delete learned[id];
  localStorage.setItem('lk-learned', JSON.stringify(learned));
  const card = btn.closest('.topic-card');
  card.classList.toggle('learned', !!learned[id]);
  btn.textContent = learned[id]?'✅':'☐';
  updateStats();
}

function toggleDomain(id){
  if(activeDomains.has(id)) activeDomains.delete(id); else activeDomains.add(id);
  applyFilters();
  renderLegend();
}

function toggleComplexity(level){
  activeComplexity = level;
  document.querySelectorAll('.fbtn[data-c]').forEach(b=>b.classList.toggle('active', parseInt(b.dataset.c)===level));
  applyFilters();
}

function toggleExam(level){
  activeExamFilter = level;
  document.querySelectorAll('.fbtn[data-e]').forEach(b=>b.classList.toggle('active', parseInt(b.dataset.e)===level));
  applyFilters();
}

function applyFilters(){
  searchTerm = document.querySelector('.search').value.toLowerCase().trim();
  document.querySelectorAll('.island').forEach(island=>{
    const domId = island.dataset.domain;
    island.style.display = activeDomains.has(domId)?'':'none';
  });
  document.querySelectorAll('.topic-card').forEach(card=>{
    const c = parseInt(card.dataset.complexity);
    const e = parseInt(card.dataset.exam||'0');
    const matchC = activeComplexity===0 || c===activeComplexity;
    const matchS = !searchTerm || card.dataset.search.includes(searchTerm);
    const matchE = activeExamFilter===0 || (activeExamFilter===1 && e>=4) || (activeExamFilter===2 && e>=3);
    card.classList.toggle('hidden', !(matchC && matchS && matchE));
  });
  requestAnimationFrame(drawConnections);
  updateStats();
}

/* ── SVG CONNECTIONS ──────────────────────────────── */
function drawConnections(){
  const svg = document.getElementById('svgLayer');
  const canvas = document.querySelector('.canvas');
  const rect = canvas.getBoundingClientRect();
  svg.setAttribute('width', canvas.scrollWidth);
  svg.setAttribute('height', canvas.scrollHeight);
  svg.innerHTML = '';
  if(window.innerWidth < 900) return;

  CONNECTIONS.forEach(conn=>{
    const fromEl = document.getElementById('card-'+conn.from);
    const toEl = document.getElementById('card-'+conn.to);
    if(!fromEl || !toEl || fromEl.classList.contains('hidden') || toEl.classList.contains('hidden')) return;
    if(fromEl.offsetParent===null || toEl.offsetParent===null) return;

    const fRect = fromEl.getBoundingClientRect();
    const tRect = toEl.getBoundingClientRect();
    const cRect = canvas.getBoundingClientRect();

    const x1 = fRect.left + fRect.width/2 - cRect.left;
    const y1 = fRect.top + fRect.height/2 - cRect.top;
    const x2 = tRect.left + tRect.width/2 - cRect.left;
    const y2 = tRect.top + tRect.height/2 - cRect.top;

    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1); line.setAttribute('y1',y1);
    line.setAttribute('x2',x2); line.setAttribute('y2',y2);
    line.dataset.from = conn.from;
    line.dataset.to = conn.to;
    svg.appendChild(line);
  });
}

function highlightConnections(topicId){
  document.querySelectorAll('.svg-layer line').forEach(line=>{
    if(line.dataset.from===topicId || line.dataset.to===topicId){
      const domain = DOMAINS.find(d=>d.topics.some(t=>t.id===topicId));
      line.classList.add('highlight');
      line.style.stroke = domain?domain.color:'#fff';
    }
  });
}

function clearConnections(){
  document.querySelectorAll('.svg-layer line').forEach(line=>{
    line.classList.remove('highlight');
    line.style.stroke = '';
  });
}

/* ── STATS ────────────────────────────────────────── */
function updateStats(){
  const allTopics = DOMAINS.flatMap(d=>d.topics);
  const visible = allTopics.filter(t=>{
    const card = document.getElementById('card-'+t.id);
    return card && !card.classList.contains('hidden');
  });
  const learnedCount = visible.filter(t=>learned[t.id]).length;
  const totalTime = visible.reduce((s,t)=>s+t.time,0);
  const remainTime = visible.filter(t=>!learned[t.id]).reduce((s,t)=>s+t.time,0);
  document.getElementById('statBar').innerHTML = `
    <span>✅ Gelernt: <span class="val">${learnedCount} / ${visible.length}</span></span>
    <span>⏱ Gesamt: <span class="val">${formatTime(totalTime)}</span></span>
    <span>📋 Verbleibend: <span class="val">${formatTime(remainTime)}</span></span>
  `;
}

/* ── INIT ─────────────────────────────────────────── */
renderIslands();
renderLegend();
updateStats();
requestAnimationFrame(()=>setTimeout(drawConnections, 100));
window.addEventListener('resize', ()=>requestAnimationFrame(drawConnections));
</script>
</body>
</html>
