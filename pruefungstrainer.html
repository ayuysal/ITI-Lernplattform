<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prüfungstrainer – Quiz &amp; Übungen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0e11;--surface:#18171d;--border:#1e2230;
  --text:#e2e4ea;--muted:#6b7084;
  --amber:#f5c542;--teal:#5ec4b6;
  --c-netz:#06b6d4;--c-sig:#a78bfa;--c-tcp:#fb923c;--c-info:#22c55e;--c-formal:#f472b6;
  --radius:12px;--correct:#22c55e;--wrong:#ef4444;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;line-height:1.5}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
a{color:inherit;text-decoration:none}

.back{display:inline-block;padding:0.6rem 0;margin:0.8rem 1.5rem;font-size:.85rem;color:var(--muted);transition:color .2s}
.back:hover{color:var(--text)}

header{text-align:center;padding:0.5rem 1.5rem 1rem}
header .tag{font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.12em;color:var(--amber);text-transform:uppercase}
header h1{font-family:'Outfit',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;margin:.3rem 0}
header p{color:var(--muted);font-size:.9rem;max-width:600px;margin:0 auto}

/* ── Toolbar ── */
.toolbar{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;align-items:center;padding:.6rem 1.5rem;max-width:1000px;margin:0 auto}
.filter-group{display:flex;gap:.3rem;align-items:center;flex-wrap:wrap}
.filter-group .label{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-right:.2rem}
.fbtn{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.3rem .55rem;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.65rem;cursor:pointer;transition:all .2s}
.fbtn:hover{border-color:var(--text);color:var(--text)}
.fbtn.active{border-color:var(--amber);color:var(--amber);background:rgba(245,197,66,.08)}

/* ── Stats bar ── */
.stats{display:flex;justify-content:center;gap:1.2rem;padding:.5rem;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted)}
.stats .val{color:var(--amber)}
.stats .correct-val{color:var(--correct)}
.stats .wrong-val{color:var(--wrong)}

/* ── Quiz container ── */
.quiz-wrap{max-width:700px;margin:0 auto;padding:0 1rem 4rem}

/* Progress bar */
.progress{height:4px;background:var(--border);border-radius:2px;margin-bottom:1rem;overflow:hidden}
.progress-fill{height:100%;background:var(--amber);border-radius:2px;transition:width .4s}

/* Question card */
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem;position:relative}
.q-meta{display:flex;gap:.5rem;align-items:center;margin-bottom:.8rem;flex-wrap:wrap}
.q-num{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--amber);background:rgba(245,197,66,.08);padding:.15rem .45rem;border-radius:4px}
.q-domain{font-family:'JetBrains Mono',monospace;font-size:.6rem;padding:.15rem .45rem;border-radius:4px;border:1px solid var(--border)}
.q-type{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);margin-left:auto}
.q-difficulty{display:flex;gap:2px;align-items:center}
.q-difficulty span{width:6px;height:6px;border-radius:50%;background:var(--border)}
.q-difficulty span.filled{background:var(--amber)}

.q-text{font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:600;line-height:1.5;margin-bottom:1rem}
.q-text code{font-family:'JetBrains Mono',monospace;background:rgba(245,197,66,.1);color:var(--amber);padding:.1rem .3rem;border-radius:3px;font-size:.9rem}

/* ── MC Options ── */
.mc-options{display:flex;flex-direction:column;gap:.5rem}
.mc-opt{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--radius);padding:.7rem 1rem;cursor:pointer;transition:all .2s;font-size:.9rem;display:flex;align-items:center;gap:.6rem}
.mc-opt:hover:not(.locked){border-color:var(--amber);background:rgba(245,197,66,.04)}
.mc-opt .mc-letter{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;width:22px;height:22px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.mc-opt.selected .mc-letter{border-color:var(--amber);color:var(--amber);background:rgba(245,197,66,.1)}
.mc-opt.correct{border-color:var(--correct);background:rgba(34,197,94,.08)}
.mc-opt.correct .mc-letter{border-color:var(--correct);color:var(--correct);background:rgba(34,197,94,.15)}
.mc-opt.wrong{border-color:var(--wrong);background:rgba(239,68,68,.06)}
.mc-opt.wrong .mc-letter{border-color:var(--wrong);color:var(--wrong);background:rgba(239,68,68,.1)}

/* ── TF Buttons ── */
.tf-wrap{display:flex;gap:.8rem;justify-content:center}
.tf-btn{flex:1;max-width:200px;padding:1rem;border-radius:var(--radius);border:2px solid var(--border);background:var(--surface);cursor:pointer;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:600;color:var(--text);transition:all .2s;text-align:center}
.tf-btn:hover:not(.locked){border-color:var(--amber)}
.tf-btn.correct{border-color:var(--correct);background:rgba(34,197,94,.1);color:var(--correct)}
.tf-btn.wrong{border-color:var(--wrong);background:rgba(239,68,68,.08);color:var(--wrong)}

/* ── Fill input ── */
.fill-wrap{display:flex;gap:.5rem;align-items:center}
.fill-input{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:.6rem .9rem;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.9rem;outline:none;transition:border-color .2s}
.fill-input:focus{border-color:var(--amber)}
.fill-input.correct{border-color:var(--correct);color:var(--correct)}
.fill-input.wrong{border-color:var(--wrong);color:var(--wrong)}
.fill-submit{background:var(--amber);color:#000;border:none;border-radius:8px;padding:.6rem 1.2rem;font-family:'Outfit',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;transition:opacity .2s}
.fill-submit:hover{opacity:.85}

/* ── Match ── */
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:.5rem .8rem}
.match-item{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:.5rem .7rem;cursor:pointer;font-size:.8rem;font-family:'JetBrains Mono',monospace;transition:all .2s;text-align:center;user-select:none}
.match-item:hover:not(.locked):not(.matched){border-color:var(--amber)}
.match-item.sel{border-color:var(--amber);background:rgba(245,197,66,.08);color:var(--amber)}
.match-item.matched{border-color:var(--correct);background:rgba(34,197,94,.06);color:var(--correct);cursor:default}
.match-item.wrong-flash{border-color:var(--wrong);background:rgba(239,68,68,.08)}
.match-hint{grid-column:1/-1;font-size:.65rem;color:var(--muted);text-align:center;font-family:'JetBrains Mono',monospace}

/* ── Order ── */
.order-pool{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.6rem}
.order-item{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:.45rem .7rem;cursor:pointer;font-size:.78rem;font-family:'JetBrains Mono',monospace;transition:all .2s;user-select:none}
.order-item:hover:not(.used){border-color:var(--amber)}
.order-item.used{opacity:.3;cursor:default}
.order-seq{display:flex;flex-wrap:wrap;gap:.3rem;min-height:2.5rem;border:1px dashed var(--border);border-radius:8px;padding:.4rem;margin-bottom:.4rem}
.order-placed{background:rgba(245,197,66,.08);border:1px solid var(--amber);border-radius:6px;padding:.3rem .6rem;font-size:.75rem;font-family:'JetBrains Mono',monospace;color:var(--amber);display:flex;align-items:center;gap:.3rem}
.order-placed .seq-num{font-size:.55rem;color:var(--muted)}
.order-correct .order-seq{border-color:var(--correct)}
.order-wrong .order-seq{border-color:var(--wrong)}
.order-reset{background:none;border:1px solid var(--border);border-radius:6px;padding:.25rem .6rem;color:var(--muted);font-size:.65rem;font-family:'JetBrains Mono',monospace;cursor:pointer}

/* ── Calc ── */
.calc-wrap{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.calc-input{width:160px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:.6rem .9rem;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.9rem;outline:none;transition:border-color .2s}
.calc-input:focus{border-color:var(--amber)}
.calc-input.correct{border-color:var(--correct);color:var(--correct)}
.calc-input.wrong{border-color:var(--wrong);color:var(--wrong)}
.calc-unit{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--muted)}

/* ── Feedback ── */
.feedback{margin-top:.8rem;padding:.7rem 1rem;border-radius:var(--radius);font-size:.82rem;line-height:1.6;display:none}
.feedback.show{display:block}
.feedback.correct{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);color:#86efac}
.feedback.wrong{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
.feedback strong{display:block;margin-bottom:.2rem}

/* ── Buttons ── */
.btn-row{display:flex;gap:.5rem;justify-content:center;margin-top:1rem}
.btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.55rem 1.2rem;color:var(--text);font-family:'Outfit',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .2s}
.btn:hover{border-color:var(--amber);color:var(--amber)}
.btn-primary{background:var(--amber);color:#000;border-color:var(--amber)}
.btn-primary:hover{opacity:.85;color:#000}
.btn:disabled{opacity:.3;cursor:default}

/* ── Start screen ── */
.start-screen{max-width:700px;margin:0 auto;padding:1rem}
.domain-cards{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:1rem}
.d-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;cursor:pointer;transition:all .2s;border-left:3px solid var(--dc)}
.d-card:hover{border-color:var(--dc);transform:translateY(-2px)}
.d-card.active{border-color:var(--dc);background:color-mix(in srgb,var(--dc) 5%,var(--surface))}
.d-card-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:.9rem;color:var(--dc)}
.d-card-sub{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);margin-top:.15rem}
.d-card-stats{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--muted);margin-top:.4rem;display:flex;gap:.6rem}

/* ── End screen ── */
.end-screen{text-align:center;padding:2rem}
.end-score{font-family:'Outfit',sans-serif;font-size:3rem;font-weight:700;color:var(--amber)}
.end-label{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--muted);margin-bottom:1rem}
.end-breakdown{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin:1rem 0}
.end-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.5rem .8rem;font-family:'JetBrains Mono',monospace;font-size:.65rem}

/* Toast */
.toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--correct);color:#000;font-family:'JetBrains Mono',monospace;font-size:.7rem;padding:.5rem 1rem;border-radius:8px;opacity:0;transition:all .3s;z-index:200;pointer-events:none;font-weight:600}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Responsive */
@media(max-width:600px){
  .domain-cards{grid-template-columns:1fr}
  .match-wrap{gap:.3rem .5rem}
  .q-card{padding:1rem}
  .tf-wrap{flex-direction:column;align-items:center}
  .slot-reel{min-width:70px;padding:.3rem .4rem}
  .slot-num{font-size:1.3rem}
  .quiz-slot{min-width:48px;padding:.25rem .35rem}
  .quiz-slot .slot-num{font-size:.95rem}
  .quiz-slot .slot-label{font-size:.4rem}
}
/* ── Slot Machine Score ── */
.score-overview{background:linear-gradient(180deg,#1a1924 0%,#13121a 100%);border:1px solid #2a2840;border-radius:16px;padding:1rem 1.2rem;margin-bottom:1rem;box-shadow:0 4px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.04)}
.slot-reels{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-bottom:.7rem}
.slot-reel{background:linear-gradient(180deg,#0a0a10 0%,#111118 40%,#111118 60%,#0a0a10 100%);border:2px solid #2a2840;border-radius:10px;padding:.4rem .6rem;min-width:90px;text-align:center;box-shadow:inset 0 2px 8px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.03);position:relative;overflow:hidden}
.slot-reel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}
.slot-reel::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent)}
.slot-num{font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:700;line-height:1.1;text-shadow:0 0 12px currentColor;letter-spacing:.02em}
.slot-num.c-muted{color:#6b7084}
.slot-num.c-amber{color:var(--amber);text-shadow:0 0 15px rgba(245,197,66,.4)}
.slot-num.c-wrong{color:var(--wrong);text-shadow:0 0 15px rgba(239,68,68,.4)}
.slot-num.c-correct{color:var(--correct);text-shadow:0 0 15px rgba(34,197,94,.4)}
.slot-label{font-family:'JetBrains Mono',monospace;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:#5a5a72;margin-top:.15rem}
.score-bar-wrap{display:flex;align-items:center;gap:.5rem}
.score-bar{flex:1;height:8px;background:#0a0a10;border-radius:4px;overflow:hidden;border:1px solid #2a2840;box-shadow:inset 0 1px 3px rgba(0,0,0,.5)}
.score-bar-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--correct));border-radius:3px;transition:width .5s;box-shadow:0 0 8px rgba(245,197,66,.3)}
.score-pct{font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:700;color:var(--amber);min-width:2.5rem;text-align:right;text-shadow:0 0 8px rgba(245,197,66,.3)}

/* ── Quiz Slot Stats ── */
.quiz-slots{display:flex;gap:.4rem;justify-content:center;margin-bottom:.8rem}
.quiz-slot{background:linear-gradient(180deg,#0a0a10,#111118,#0a0a10);border:1.5px solid #2a2840;border-radius:8px;padding:.3rem .5rem;min-width:70px;text-align:center;box-shadow:inset 0 1px 4px rgba(0,0,0,.5)}
.quiz-slot .slot-num{font-size:1.2rem}
.quiz-slot .slot-label{font-size:.45rem}

/* ── Streak Badge ── */
.streak-badge{font-family:'JetBrains Mono',monospace;font-size:.55rem;background:rgba(245,197,66,.1);color:var(--amber);padding:.1rem .35rem;border-radius:4px;border:1px solid rgba(245,197,66,.2)}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>

<header>
  <div class="tag">Informatik-Studium</div>
  <h1>Prüfungstrainer</h1>
  <p>7 Fragetypen, 4 Schwierigkeitsstufen – von Multiple-Choice bis Berechnung. Progressiv aufgebaut nach Bloom's Taxonomie.</p>
</header>

<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════
   QUESTION DATABASE — ~200 questions, all domains
   Format: d=domain, tp=topic, t=type, df=difficulty(1-4),
   q=question, ...type-specific fields, e=explanation
   Types: mc, tf, fill, match, order, calc
   ═══════════════════════════════════════════════════════ */
const Q = [
// ━━━ NETZWERK-GRUNDLAGEN ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// netz-internet
{d:'netz',tp:'Internet & Organisation',t:'mc',df:1,q:'Welche Organisation verwaltet die globale Vergabe von IP-Adressen?',
  o:['IANA','IETF','IEEE','ISO'],c:0,e:'IANA (Internet Assigned Numbers Authority) verwaltet die globale IP-Adressvergabe, delegiert an RIRs wie RIPE.'},
{d:'netz',tp:'Internet & Organisation',t:'tf',df:1,q:'RFC steht für "Request for Comments" und beschreibt Internet-Standards.',
  c:true,e:'Korrekt. RFCs sind die offiziellen Dokumente, die Internet-Standards und -Protokolle beschreiben.'},
{d:'netz',tp:'Internet & Organisation',t:'fill',df:1,q:'Der größte Internet-Austauschknoten Europas heißt <code>___</code>.',
  a:['DE-CIX','de-cix','DECIX'],e:'Der DE-CIX (Deutscher Commercial Internet Exchange) in Frankfurt ist der größte IXP Europas.'},

// netz-grundlagen
{d:'netz',tp:'Computernetz-Grundlagen',t:'mc',df:1,q:'Wie viele Verbundeffekte werden bei Computernetzen unterschieden?',
  o:['5','7','9','11'],c:2,e:'Es gibt 9 Verbundeffekte: Kommunikation, Ressourcen, Last, Verfügbarkeit, Leistung, Daten, Kosten, Sicherheit, Funktionsverbund.'},
{d:'netz',tp:'Computernetz-Grundlagen',t:'tf',df:1,q:'Ein Intranet ist ein öffentlich zugängliches Netzwerk.',
  c:false,e:'Falsch. Ein Intranet ist ein privates, organisationsinternes Netzwerk. Öffentlich zugänglich ist das Internet.'},
{d:'netz',tp:'Computernetz-Grundlagen',t:'fill',df:1,q:'Ein Computernetz besteht aus mindestens <code>___</code> autonomen Rechnern.',
  a:['2','zwei'],e:'Per Definition besteht ein Computernetz aus mindestens 2 autonomen (eigenständig arbeitsfähigen) Rechnern.'},

// netz-topo
{d:'netz',tp:'Topologien & Klassifikation',t:'mc',df:1,q:'Welche Topologie bietet die höchste Ausfallsicherheit?',
  o:['Stern','Bus','Ring','Vermascht (Mesh)'],c:3,e:'Eine vermaschte Topologie (Mesh) hat die höchste Redundanz – jeder Knoten ist mit mehreren anderen verbunden.'},
{d:'netz',tp:'Topologien & Klassifikation',t:'order',df:2,q:'Sortiere die Netzreichweiten von klein nach groß:',
  items:['PAN','LAN','MAN','WAN','GAN'],e:'Personal Area Network < Local AN < Metropolitan AN < Wide AN < Global AN.'},
{d:'netz',tp:'Topologien & Klassifikation',t:'match',df:2,q:'Ordne die Vermittlungsart der Beschreibung zu:',
  pairs:[['Circuit Switching','Fester Pfad, Ressourcen reserviert'],['Packet Switching','Pakete, flexibler Weg'],['Message Switching','Komplette Nachricht weitergeleitet']],e:'Circuit = Leitungsvermittlung (Telefon), Packet = Paketvermittlung (Internet), Message = Nachrichtenvermittlung (Store-and-Forward).'},
{d:'netz',tp:'Topologien & Klassifikation',t:'tf',df:1,q:'Bei Simplex-Kommunikation können beide Seiten gleichzeitig senden und empfangen.',
  c:false,e:'Falsch. Simplex = nur eine Richtung. Halbduplex = abwechselnd. Vollduplex = gleichzeitig beide Richtungen.'},

// netz-kenn
{d:'netz',tp:'Kenngrößen',t:'fill',df:2,q:'Latenz = t<sub>v</sub> + t<sub>w</sub> + <code>___</code> + t<sub>a</sub>',
  a:['t_Ü','t_ü','tÜ','t_Ue'],e:'Die 4 Latenz-Komponenten: Verarbeitung (t_v), Warteschlange (t_w), Übertragung (t_Ü), Ausbreitung (t_a).'},
{d:'netz',tp:'Kenngrößen',t:'calc',df:3,q:'Berechne die Übertragungszeit t_Ü für D = 10 Mbit und b = 100 Mbit/s.',
  a:0.1,tol:0.01,unit:'Sekunden',e:'t_Ü = D/b = 10 Mbit / 100 Mbit/s = 0,1 Sekunden.'},
{d:'netz',tp:'Kenngrößen',t:'mc',df:2,q:'Welche Basis wird für Übertragungsraten (kbit/s, Mbit/s) verwendet?',
  o:['Basis 2 (1024)','Basis 10 (1000)','Basis 8 (512)','Basis 16'],c:1,e:'Übertragungsraten verwenden Basis 10: 1 kbit/s = 1000 bit/s. Speichergrößen verwenden Basis 2.'},
{d:'netz',tp:'Kenngrößen',t:'tf',df:2,q:'Jitter beschreibt die Schwankung der Latenz.',
  c:true,e:'Korrekt. Jitter = Varianz der Verzögerung. Problematisch bei Echtzeitanwendungen (VoIP, Video).'},

// netz-osi
{d:'netz',tp:'OSI- & TCP/IP-Modell',t:'order',df:1,q:'Sortiere die OSI-Schichten von unten (1) nach oben (7):',

/* ── History: { qId: { streak, last, box } } ── */
let history = (function(){
  const raw = JSON.parse(localStorage.getItem('pt-history')||'{}');
  // migrate old format ("correct"/"wrong" strings → objects)
  for(const k in raw){
    if(typeof raw[k]==='string'){
      raw[k] = raw[k]==='correct'
        ? {streak:1, last:'correct', box:2}
        : {streak:0, last:'wrong', box:1};
    }
  }
  localStorage.setItem('pt-history', JSON.stringify(raw));
  return raw;
})();

function saveHistory(){ localStorage.setItem('pt-history', JSON.stringify(history)); }

function getBox(q){
  const h = history[qId(q)];
  if(!h) return 0;
  return h.box;
}
function getStreak(q){
  const h = history[qId(q)];
  return h ? h.streak : 0;
}
function globalStats(){
  let offen=0, inArbeit=0, unsicher=0, gelernt=0;
  Q.forEach(q=>{
    const b = getBox(q);
    if(b===0) offen++;
    else if(b===1) unsicher++;
    else if(b===2) inArbeit++;
    else gelernt++;
  });
  return {offen, inArbeit, unsicher, gelernt, total:Q.length};
}
function quizSlotsHTML(remaining){
  const gs = globalStats();
  return `
    <div class="quiz-slot"><div class="slot-num c-muted">${remaining}</div><div class="slot-label">📋 Übrig</div></div>
    <div class="quiz-slot"><div class="slot-num c-amber">${gs.inArbeit}</div><div class="slot-label">🔄 In Arbeit</div></div>
    <div class="quiz-slot"><div class="slot-num c-wrong">${gs.unsicher}</div><div class="slot-label">❌ Unsicher</div></div>
    <div class="quiz-slot"><div class="slot-num c-correct">${gs.gelernt}</div><div class="slot-label">✅ Gelernt</div></div>`;
}

/* ═══════════════════════════════════════════════════════
   RENDER ENGINE
   ═══════════════════════════════════════════════════════ */
const app = document.getElementById('app');

function render(){
  if(state.screen==='start') renderStart();
  else if(state.screen==='quiz') renderQuiz();
  else renderEnd();
}

function renderStart(){
  const gs = globalStats();
  const pct = gs.total ? Math.round(gs.gelernt/gs.total*100) : 0;
  const domainStats = DOMAINS.map(d=>{
    const qs = Q.filter(q=>q.d===d.id);
    const learned = qs.filter(q=>getBox(q)===3).length;
    const unsicher = qs.filter(q=>getBox(q)===1).length;
    return {d, total:qs.length, learned, unsicher};
  });

  app.innerHTML = `
    <div class="start-screen">
      <div class="score-overview">
        <div class="slot-reels">
          <div class="slot-reel">
            <div class="slot-num c-muted">${gs.offen}</div>
            <div class="slot-label">📋 Offen</div>
          </div>
          <div class="slot-reel">
            <div class="slot-num c-amber">${gs.inArbeit}</div>
            <div class="slot-label">🔄 In Arbeit</div>
          </div>
          <div class="slot-reel">
            <div class="slot-num c-wrong">${gs.unsicher}</div>
            <div class="slot-label">❌ Unsicher</div>
          </div>
          <div class="slot-reel">
            <div class="slot-num c-correct">${gs.gelernt}</div>
            <div class="slot-label">✅ Gelernt</div>
          </div>
        </div>
        <div class="score-bar-wrap">
          <div class="score-bar">
            <div class="score-bar-fill" style="width:${pct}%"></div>
          </div>
          <span class="score-pct">${pct}%</span>
        </div>
      </div>
      <div class="toolbar">
        <div class="filter-group">
          <span class="label">Stufe</span>
          <button class="fbtn${state.filterDiff===0?' active':''}" onclick="setDiff(0)">Alle</button>
          <button class="fbtn${state.filterDiff===1?' active':''}" onclick="setDiff(1)">1 Erinnern</button>
          <button class="fbtn${state.filterDiff===2?' active':''}" onclick="setDiff(2)">2 Verstehen</button>
          <button class="fbtn${state.filterDiff===3?' active':''}" onclick="setDiff(3)">3 Anwenden</button>
        </div>
        <div class="filter-group">
          <span class="label">Typ</span>
          <button class="fbtn${state.filterType==='all'?' active':''}" onclick="setType('all')">Alle</button>
          ${Object.keys(TYPES).map(t=>`<button class="fbtn${state.filterType===t?' active':''}" onclick="setType('${t}')">${TYPES[t].split(' ')[0]}</button>`).join('')}
        </div>
      </div>
      <div class="domain-cards">
        ${domainStats.map(({d,total,learned,unsicher})=>`
          <div class="d-card${state.filterDomain===d.id?' active':''}" style="--dc:${d.color}" onclick="toggleDomain('${d.id}')">
            <div class="d-card-title">${d.label}</div>
            <div class="d-card-sub">${countFiltered(d.id)} Fragen verfügbar</div>
            <div class="d-card-stats">
              <span>✅ ${learned}/${total}</span>
              ${unsicher?`<span style="color:var(--wrong)">❌ ${unsicher}</span>`:''}
              <span>${total?Math.round(learned/total*100):0}%</span>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="btn-row">
        <button class="btn" onclick="startQuiz(false)">🎯 Alle starten (${countFiltered('all')})</button>
        <button class="btn btn-primary" onclick="startQuiz(true)">🔥 Nur Fehler wiederholen (${countWrong()})</button>
        <button class="btn" onclick="copySync()" title="Fortschritt als Link kopieren – auf anderem Gerät öffnen">🔗 Sync</button>
      </div>
    </div>`;
}

function countFiltered(domain){
  return Q.filter(q=>{
    if(domain!=='all' && q.d!==domain) return false;
    if(state.filterDomain!=='all' && q.d!==state.filterDomain) return false;
    if(state.filterDiff && q.df!==state.filterDiff) return false;
    if(state.filterType!=='all' && q.t!==state.filterType) return false;
    return true;
  }).length;
}
function countWrong(){
  return Q.filter(q=>getBox(q)===1).length;
}

function renderQuiz(){
  if(!state.queue.length){ state.screen='end'; render(); return; }
  const q = state.queue[0]; // peek at front
  const dom = DOMAINS.find(d=>d.id===q.d);
  const streak = getStreak(q);
  const isRepeat = streak > 0 || getBox(q) === 1;
  const remaining = state.queue.length;
  const pct = state.totalUnique ? Math.round((state.totalUnique - remaining) / state.totalUnique * 100) : 0;

  let answerHTML = '';
  if(q.t==='mc') answerHTML = renderMC(q);
  else if(q.t==='tf') answerHTML = renderTF(q);
  else if(q.t==='fill') answerHTML = renderFill(q);
  else if(q.t==='match') answerHTML = renderMatch(q);
  else if(q.t==='order') answerHTML = renderOrder(q);
  else if(q.t==='calc') answerHTML = renderCalc(q);

  app.innerHTML = `
    <div class="quiz-wrap">
      <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="quiz-slots" id="quizStats">
        ${quizSlotsHTML(remaining)}
      </div>
      <div class="q-card">
        <div class="q-meta">
          <span class="q-num">${isRepeat?'🔄 Wiederholung':'Frage'}</span>
          <span class="q-domain" style="border-color:${dom.color};color:${dom.color}">${q.tp}</span>
          <span class="q-type">${TYPES[q.t]}</span>
          <span class="q-difficulty">${[1,2,3,4].map(i=>`<span${i<=q.df?' class="filled"':''} title="${DIFF_LABELS[q.df]}"></span>`).join('')}</span>
          ${streak>0?`<span class="streak-badge">${streak}/${MASTERED_STREAK}</span>`:''}
        </div>
        <div class="q-text">${q.q}</div>
        <div id="answer-area">${answerHTML}</div>
        <div class="feedback" id="feedback"></div>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="state.screen='start';render()">✕ Beenden</button>
        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>Weiter →</button>
      </div>
    </div>`;
  state.locked = false;
  if(q.t==='match') initMatch(q);
  if(q.t==='order') initOrder(q);
}

/* ── MC ── */
function renderMC(q){
  const letters = 'ABCD';
  return `<div class="mc-options">${q.o.map((opt,i)=>`
    <div class="mc-opt" data-i="${i}" onclick="answerMC(${i})">
      <span class="mc-letter">${letters[i]}</span><span>${opt}</span>
    </div>`).join('')}</div>`;
}
function answerMC(i){
  if(state.locked) return;
  state.locked = true;
  const q = state.queue[0];
  const correct = i === q.c;
  document.querySelectorAll('.mc-opt').forEach((el,j)=>{
    el.classList.add('locked');
    if(j===q.c) el.classList.add('correct');
    if(j===i && !correct) el.classList.add('wrong');
  });
  showFeedback(correct, q.e);
}

/* ── TF ── */
function renderTF(q){
  return `<div class="tf-wrap">
    <button class="tf-btn" onclick="answerTF(true)">✓ Wahr</button>
    <button class="tf-btn" onclick="answerTF(false)">✕ Falsch</button>
  </div>`;
}
function answerTF(val){
  if(state.locked) return;
  state.locked = true;
  const q = state.queue[0];
  const correct = val === q.c;
  document.querySelectorAll('.tf-btn').forEach(btn=>{
    btn.classList.add('locked');
    const isTrue = btn.textContent.includes('Wahr');
    if(isTrue===q.c) btn.classList.add('correct');
    if(isTrue===val && !correct) btn.classList.add('wrong');
  });
  showFeedback(correct, q.e);
}

/* ── Fill ── */
function renderFill(q){
  return `<div class="fill-wrap">
    <input class="fill-input" id="fillInput" placeholder="Antwort eingeben…" onkeydown="if(event.key==='Enter')answerFill()">
    <button class="fill-submit" onclick="answerFill()">Prüfen</button>
  </div>`;
}
function answerFill(){
  if(state.locked) return;
  state.locked = true;
  const q = state.queue[0];
  const input = document.getElementById('fillInput');
  const val = input.value.trim();
  const correct = q.a.some(a=>a.toLowerCase()===val.toLowerCase());
  input.classList.add(correct?'correct':'wrong');
  if(!correct) input.value = val + '  →  ' + q.a[0];
  showFeedback(correct, q.e);
}

/* ── Match ── */
let matchState = {sel:null, matched:[], pairs:[]};
function renderMatch(q){
  return `<div class="match-wrap" id="matchArea">
    <div class="match-hint">Klicke links, dann rechts zum Zuordnen</div>
  </div>`;
}
function initMatch(q){
  matchState = {sel:null, matched:[], pairs:q.pairs};
  const area = document.getElementById('matchArea');
  const left = q.pairs.map(p=>p[0]);
  const right = shuffle([...q.pairs.map(p=>p[1])]);
  let html = '<div class="match-hint">Klicke links, dann rechts zum Zuordnen</div>';
  left.forEach((l,i)=>{ html += `<div class="match-item match-l" data-side="l" data-i="${i}" onclick="matchClick(this)">${l}</div><div class="match-item match-r" data-side="r" data-val="${q.pairs[i][1]}" onclick="matchClick(this)">${right[i]}</div>`; });
  area.innerHTML = html;
}
function matchClick(el){
  if(state.locked || el.classList.contains('matched')) return;
  const side = el.dataset.side;
  if(side==='l'){
    document.querySelectorAll('.match-l.sel').forEach(e=>e.classList.remove('sel'));
    el.classList.add('sel');
    matchState.sel = {side:'l', i:parseInt(el.dataset.i), el};
  } else if(matchState.sel && matchState.sel.side==='l'){
    const leftIdx = matchState.sel.i;
    const rightVal = el.textContent;
    const expected = matchState.pairs[leftIdx][1];
    if(rightVal === expected){
      matchState.sel.el.classList.remove('sel');
      matchState.sel.el.classList.add('matched');
      el.classList.add('matched');
      matchState.matched.push(leftIdx);
      if(matchState.matched.length === matchState.pairs.length){
        showFeedback(true, state.queue[0].e);
        state.locked = true;
      }
    } else {
      el.classList.add('wrong-flash');
      setTimeout(()=>el.classList.remove('wrong-flash'),600);
    }
    matchState.sel = null;
    document.querySelectorAll('.match-l.sel').forEach(e=>e.classList.remove('sel'));
  }
}

/* ── Order ── */
let orderState = {seq:[], items:[]};
function renderOrder(q){
  return `<div id="orderArea">
    <div class="order-seq" id="orderSeq"></div>
    <div class="order-pool" id="orderPool"></div>
    <button class="order-reset" onclick="resetOrder()">↺ Reset</button>
  </div>`;
}
function initOrder(q){
  orderState = {seq:[], items:[...q.items]};
  const shuffled = shuffle([...q.items]);
  const pool = document.getElementById('orderPool');
  pool.innerHTML = shuffled.map((item,i)=>`<div class="order-item" data-val="${item}" onclick="orderClick(this)">${item}</div>`).join('');
}
function orderClick(el){
  if(state.locked || el.classList.contains('used')) return;
  el.classList.add('used');
  orderState.seq.push(el.dataset.val);
  const seq = document.getElementById('orderSeq');
  seq.innerHTML = orderState.seq.map((s,i)=>`<div class="order-placed"><span class="seq-num">${i+1}.</span> ${s}</div>`).join('');
  if(orderState.seq.length === orderState.items.length){
    state.locked = true;
    const q = state.queue[0];
    const correct = orderState.seq.every((s,i)=>s===q.items[i]);
    const area = document.getElementById('orderArea');
    area.classList.add(correct?'order-correct':'order-wrong');
    if(!correct){
      seq.innerHTML += `<div style="color:var(--wrong);font-size:.7rem;width:100%;margin-top:.3rem">Richtig: ${q.items.join(' → ')}</div>`;
    }
    showFeedback(correct, q.e);
  }
}
function resetOrder(){
  if(state.locked) return;
  orderState.seq = [];
  document.getElementById('orderSeq').innerHTML = '';
  document.querySelectorAll('.order-item').forEach(el=>el.classList.remove('used'));
}

/* ── Calc ── */
function renderCalc(q){
  return `<div class="calc-wrap">
    <input class="calc-input" id="calcInput" type="number" step="any" placeholder="Ergebnis…" onkeydown="if(event.key==='Enter')answerCalc()">
    <span class="calc-unit">${q.unit||''}</span>
    <button class="fill-submit" onclick="answerCalc()">Prüfen</button>
  </div>`;
}
function answerCalc(){
  if(state.locked) return;
  state.locked = true;
  const q = state.queue[0];
  const input = document.getElementById('calcInput');
  const val = parseFloat(input.value);
  const correct = !isNaN(val) && Math.abs(val - q.a) <= (q.tol||0.01);
  input.classList.add(correct?'correct':'wrong');
  if(!correct) input.value = val + '  →  ' + q.a;
  showFeedback(correct, q.e);
}

/* ── Feedback ── */
function showFeedback(correct, explanation){
  const q = state.queue[0];
  const id = qId(q);
  state.answered++;
  if(correct) state.score++;

  // update history with streak/box
  const prev = history[id] || {streak:0, last:'', box:0};
  if(correct){
    prev.streak++;
    prev.last = 'correct';
    if(prev.streak >= MASTERED_STREAK){
      prev.box = 3; // learned!
      state.sessionLearned++;
    } else {
      prev.box = 2; // known but not mastered
    }
  } else {
    prev.streak = 0;
    prev.last = 'wrong';
    prev.box = 1; // unsicher
  }
  history[id] = prev;
  saveHistory();

  // feedback badge for streak
  let streakHint = '';
  if(correct && prev.box === 3) streakHint = ' 🏆 Gelernt!';
  else if(correct) streakHint = ` (${prev.streak}/${MASTERED_STREAK})`;

  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (correct?'correct':'wrong');
  fb.innerHTML = `<strong>${correct?'✅ Richtig!'+streakHint:'❌ Falsch – kommt gleich nochmal!'}</strong>${explanation}`;
  document.getElementById('nextBtn').disabled = false;

  // update live stats
  const remaining = state.queue.length - 1;
  const statsEl = document.getElementById('quizStats');
  if(statsEl) statsEl.innerHTML = quizSlotsHTML(remaining);
}

function nextQuestion(){
  const q = state.queue.shift(); // remove current from front
  const h = history[qId(q)];
  if(h){
    if(h.box === 1){
      // wrong → re-insert after REINSERT_WRONG positions
      const pos = Math.min(REINSERT_WRONG, state.queue.length);
      state.queue.splice(pos, 0, q);
    } else if(h.box === 2){
      // known but not mastered → re-insert after REINSERT_KNOWN positions
      const pos = Math.min(REINSERT_KNOWN, state.queue.length);
      state.queue.splice(pos, 0, q);
    }
    // box 3 (learned) → don't re-insert
  }
  renderQuiz();
}

/* ── End screen ── */
function renderEnd(){
  const pct = state.answered ? Math.round(state.score/state.answered*100) : 0;
  const grade = pct>=90?'🏆 Ausgezeichnet!':pct>=70?'👍 Gut!':pct>=50?'📖 Weiter üben!':'💪 Nicht aufgeben!';
  const gs = globalStats();
  const wrongCount = countWrong();

  app.innerHTML = `
    <div class="quiz-wrap">
      <div class="end-screen">
        <div class="end-score">${pct}%</div>
        <div class="end-label">${state.score} von ${state.answered} richtig · ${grade}</div>
        <div class="end-breakdown">
          <div class="end-item" style="border-color:var(--correct)"><span style="color:var(--correct)">🏆 Neu gelernt</span><br><strong>${state.sessionLearned}</strong></div>
          <div class="end-item" style="border-color:var(--wrong)"><span style="color:var(--wrong)">❌ Noch unsicher</span><br><strong>${wrongCount}</strong></div>
          <div class="end-item" style="border-color:var(--amber)"><span style="color:var(--amber)">📊 Gesamt gelernt</span><br><strong>${gs.gelernt}/${gs.total}</strong></div>
        </div>
        <div class="btn-row">
          <button class="btn" onclick="state.screen='start';render()">← Zurück</button>
          <button class="btn btn-primary" onclick="startQuiz(false)">🔄 Nochmal</button>
          ${wrongCount?`<button class="btn" onclick="startQuiz(true)">🔥 Fehler wiederholen (${wrongCount})</button>`:''}
        </div>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════════════════════
   ACTIONS
   ═══════════════════════════════════════════════════════ */
function toggleDomain(id){
  state.filterDomain = state.filterDomain===id ? 'all' : id;
  render();
}
function setDiff(d){ state.filterDiff=d; render(); }
function setType(t){ state.filterType=t; render(); }

function startQuiz(onlyWrong){
  let qs = [...Q];
  if(onlyWrong){
    qs = qs.filter(q=>getBox(q)===1);
  } else {
    if(state.filterDomain!=='all') qs = qs.filter(q=>q.d===state.filterDomain);
    if(state.filterDiff) qs = qs.filter(q=>q.df===state.filterDiff);
    if(state.filterType!=='all') qs = qs.filter(q=>q.t===state.filterType);
    // exclude already mastered (box 3)
    qs = qs.filter(q=>getBox(q)<3);
  }
  if(!qs.length){ showToast('Keine Fragen mit diesen Filtern!'); return; }

  // sort by type priority, shuffle within each group
  const groups = {};
  qs.forEach(q=>{
    const p = TYPE_PRIO[q.t] || 2;
    if(!groups[p]) groups[p] = [];
    groups[p].push(q);
  });
  const sorted = [];
  [1,2,3].forEach(p=>{
    if(groups[p]) sorted.push(...shuffle(groups[p]));
  });

  // move unsicher (box 1) questions to the front of their type group
  // so they get repeated early
  const unsicher = sorted.filter(q=>getBox(q)===1);
  const rest = sorted.filter(q=>getBox(q)!==1);
  // interleave: put each unsicher item near the front
  const queue = [...rest];
  unsicher.forEach((q,i)=>{
    const pos = Math.min(i * 2, queue.length);
    queue.splice(pos, 0, q);
  });

  state.queue = queue;
  state.totalUnique = queue.length;
  state.score = 0;
  state.answered = 0;
  state.sessionLearned = 0;
  state.screen = 'quiz';
  render();
}

/* ═══════════════════════════════════════════════════════
   UTILS
   ═══════════════════════════════════════════════════════ */
function qId(q){ return q.d+'|'+q.tp+'|'+q.q.substring(0,40); }
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

/* ═══════════════════════════════════════════════════════
   CROSS-DEVICE SYNC
   ═══════════════════════════════════════════════════════ */
(function importFromURL(){
  const hash = window.location.hash;
  if(!hash.startsWith('#sync=')) return;
  try {
    const data = JSON.parse(atob(decodeURIComponent(hash.slice(6))));
    if(typeof data === 'object' && data !== null){
      /* Merge: keep the higher box/streak from either source */
      Object.keys(data).forEach(k=>{
        const incoming = data[k];
        const local = history[k];
        if(!local || incoming.box > local.box || (incoming.box === local.box && incoming.streak > local.streak)){
          history[k] = incoming;
        }
      });
      saveHistory();
      window.history.replaceState(null, '', window.location.pathname + window.location.search);
      setTimeout(()=>showToast('✅ Fortschritt synchronisiert!'), 300);
    }
  } catch(e){ console.warn('Sync-Import fehlgeschlagen', e); }
})();

function copySync(){
  const encoded = btoa(JSON.stringify(history));
  const url = window.location.origin + window.location.pathname + '#sync=' + encoded;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(()=>showToast('📋 Sync-Link kopiert!')).catch(()=>fallbackCopy(url));
  } else { fallbackCopy(url); }
}
function fallbackCopy(url){
  const ta = document.createElement('textarea');
  ta.value = url; ta.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); showToast('📋 Sync-Link kopiert!'); }
  catch(e){ prompt('Sync-Link kopieren:', url); }
  document.body.removeChild(ta);
}

/* ── INIT ── */
render();
</script>
