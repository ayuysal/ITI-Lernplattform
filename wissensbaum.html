<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wissensbaum &ndash; Informatik Studium</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0c0e13;--surface:#14171e;--border:#1e2230;--text:#e2e4ea;--muted:#6b7084;--accent:#6c63ff;
    --c-netz:#06b6d4;--c-sig:#a78bfa;--c-tcp:#fb923c;--c-info:#22c55e;--c-formal:#f472b6}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
  .noise{position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
  .container{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:40px 20px 80px}
  /* Header */
  .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:12px;transition:color .15s}
  .back-link:hover{color:var(--accent)}
  header{text-align:center;margin-bottom:36px}
  header .tag{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
  header h1{font-weight:900;font-size:clamp(24px,5vw,40px);background:linear-gradient(135deg,#fff,#9ba0b5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
  header p{font-weight:300;color:var(--muted);font-size:14px}
  /* Search */
  .search-wrap{max-width:400px;margin:0 auto 20px;position:relative}
  .search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 16px 10px 38px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:border-color .2s}
  .search-input:focus{border-color:var(--accent)}
  .search-input::placeholder{color:var(--muted)}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
  .search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;display:none;padding:2px 6px}
  .search-clear:hover{color:var(--text)}
  .no-results{display:none;text-align:center;padding:40px;color:var(--muted);font-size:14px}
  /* Controls */
  .controls{display:flex;gap:8px;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
  .ctrl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .2s}
  .ctrl-btn:hover{background:rgba(255,255,255,.06);color:var(--text);border-color:rgba(255,255,255,.1)}
  /* Tree */
  .tree{position:relative;padding-left:0}
  /* L0 Branch */
  .branch{margin-bottom:6px}
  .branch-header{display:flex;align-items:center;gap:14px;padding:16px 20px;border-radius:14px;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all .25s;position:relative;user-select:none}
  .branch-header:hover{border-color:rgba(255,255,255,.1);background:rgba(20,23,30,.98)}
  .branch-header.open{border-color:rgba(255,255,255,.08)}
  .branch-bar{width:4px;height:100%;position:absolute;left:0;top:0;border-radius:14px 0 0 14px}
  .branch-emoji{font-size:26px;flex-shrink:0;filter:saturate(1.1)}
  .branch-text{flex:1;min-width:0}
  .branch-title{font-size:18px;font-weight:700;line-height:1.2}
  .branch-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.5px;margin-top:2px}
  .branch-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);padding:3px 10px;border-radius:6px;background:rgba(255,255,255,.04);flex-shrink:0}
  .branch-chevron{font-size:14px;color:var(--muted);transition:transform .3s;flex-shrink:0}
  .branch-header.open .branch-chevron{transform:rotate(90deg)}
  .branch-children{overflow:hidden;max-height:0;opacity:0;transition:max-height .5s cubic-bezier(.4,0,.2,1),opacity .35s ease,margin .3s;margin-left:22px;border-left:2px solid var(--border);padding-left:0;margin-top:0}
  .branch-children.open{opacity:1;margin-top:4px}
  /* L1 Topic */
  .topic{margin:0;position:relative}
  .topic-header{display:flex;align-items:center;gap:12px;padding:12px 18px;margin-left:16px;border-radius:10px;cursor:pointer;transition:all .25s;user-select:none}
  .topic-header:hover{background:rgba(255,255,255,.03)}
  .topic-header.open{background:rgba(255,255,255,.02)}
  .topic-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px var(--dot-color)}
  .topic-connector{position:absolute;left:0;top:0;bottom:0;width:16px}
  .topic-connector::before{content:'';position:absolute;left:0;top:22px;width:16px;height:2px;background:var(--border)}
  .topic-emoji{font-size:18px;flex-shrink:0}
  .topic-text{flex:1;min-width:0}
  .topic-title{font-size:14px;font-weight:600;line-height:1.3}
  .topic-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.3px}
  .topic-chevron{font-size:12px;color:var(--muted);transition:transform .3s;flex-shrink:0}
  .topic-header.open .topic-chevron{transform:rotate(90deg)}
  .topic-link{font-size:10px;color:var(--muted);text-decoration:none;padding:3px 8px;border-radius:5px;border:1px solid var(--border);font-family:'JetBrains Mono',monospace;transition:all .15s;flex-shrink:0;white-space:nowrap}
  .topic-link:hover{border-color:var(--accent);color:var(--accent);background:rgba(108,99,255,.08)}
  .topic-children{overflow:hidden;max-height:0;opacity:0;transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s;margin-left:38px;border-left:2px dashed rgba(255,255,255,.04);padding-left:0}
  .topic-children.open{opacity:1}
  /* L2 Concept */
  .concept{position:relative}
  .concept-item{display:flex;align-items:flex-start;gap:10px;padding:9px 16px;margin-left:14px;border-radius:8px;transition:all .2s;user-select:none}
  .concept-item:hover{background:rgba(255,255,255,.03)}
  .concept-connector{position:absolute;left:0;top:0;width:14px}
  .concept-connector::before{content:'';position:absolute;left:0;top:16px;width:14px;height:1px;background:rgba(255,255,255,.06)}
  .concept-dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0;opacity:.7}
  .concept-text{flex:1;min-width:0}
  .concept-title{font-size:12px;font-weight:600;line-height:1.3}
  .concept-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted)}
  .concept-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
  .concept-tag{font-family:'JetBrains Mono',monospace;font-size:8px;padding:1px 6px;border-radius:3px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);color:var(--muted)}
  /* L2 Description */
  .topic-desc{margin:0 0 6px 14px;padding:10px 14px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.04);border-radius:8px}
  .topic-desc p{font-size:11px;color:var(--muted);line-height:1.6;font-weight:300}
  .topic-desc strong{color:var(--text);font-weight:600}
  /* L3 Deep */
  .deep-items{margin-top:6px}
  .deep-item{display:flex;align-items:center;gap:8px;padding:5px 12px;margin-left:8px;border-radius:6px;font-size:11px;color:var(--muted);font-weight:300}
  .deep-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;opacity:.5}
  .deep-item strong{color:var(--text);font-weight:600;margin-right:3px}
  /* Progress */
  .progress-bar{position:fixed;top:0;left:0;right:0;height:3px;z-index:100;background:var(--border)}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--c-netz),var(--c-sig),var(--c-tcp),var(--c-info),var(--c-formal));width:0%;transition:width .5s ease}
  /* Stat bar */
  .stat-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--surface);border-top:1px solid var(--border);backdrop-filter:blur(12px);padding:8px 20px;display:flex;align-items:center;justify-content:center;gap:20px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);flex-wrap:wrap}
  .stat-item{display:flex;align-items:center;gap:5px}
  .stat-dot{width:8px;height:8px;border-radius:3px}
  /* Animations */
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .branch{animation:fadeUp .4s ease both}
  .branch:nth-child(1){animation-delay:.05s}
  .branch:nth-child(2){animation-delay:.1s}
  .branch:nth-child(3){animation-delay:.15s}
  .branch:nth-child(4){animation-delay:.2s}
  .branch:nth-child(5){animation-delay:.25s}
  .hidden{display:none!important}
  @media(max-width:600px){.branch-title{font-size:15px}.branch-header{padding:12px 14px;gap:10px}.stat-bar{gap:10px;font-size:10px}}
</style>
</head>
<body>
<div class="noise"></div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
<div class="container">
  <a href="index.html" class="back-link">&larr; Zur&uuml;ck zur Lernplattform</a>
  <header>
    <div class="tag">Informatik-Studium</div>
    <h1>Wissensbaum</h1>

  </div>
  <div class="controls">
    <button class="ctrl-btn" onclick="expandAll()">&#8597; Alle &ouml;ffnen</button>

  <div class="no-results" id="noResults">Kein Treffer gefunden.</div>
</div>
<div class="stat-bar">

  <div class="stat-item"><div class="stat-dot" style="background:var(--c-sig)"></div>Signale</div>
  <div class="stat-item"><div class="stat-dot" style="background:var(--c-tcp)"></div>TCP/IP</div>
  <div class="stat-item"><div class="stat-dot" style="background:var(--c-info)"></div>Informatik</div>
  <div class="stat-item"><div class="stat-dot" style="background:var(--c-formal)"></div>Automaten</div>

  <div class="stat-item">Ge&ouml;ffnet: <strong style="color:var(--text)" id="stat-open">0</strong> / <span id="stat-total">0</span></div>
</div>

        desc:'<strong>DTM</strong> = 7-Tupel, unbeschrГӨnktes Band. MГӨchtigstes Automatenmodell. <strong>Church-Turing-These</strong>: Alles Berechenbare ist TM-berechenbar.',
        children: [
          { title:'DTM (7-Tupel)', sub:'M = (Q, ОЈ, О“, Оҙ, qвӮҖ, $, E) В· Оҙ: QГ—О“ вҶ’ QГ—О“Г—{L,N,R}' },
          { title:'DTM вүЎ NTM', sub:'Gleiche Akzeptorkraft В· NTM simulierbar durch DTM' },
          { title:'LBTM', sub:'Linear beschrГӨnkte TM В· Typ-1-Sprachen (kontextsensitiv)' },
          { title:'UTM', sub:'Universelle TM В· Simuliert jede andere TM' },
          { title:'Sprachklassen', sub:'Rekursiv aufzГӨhlbar (Typ 0) vs. Rekursiv (entscheidbar)', deep:[
            {t:'VollstГӨndige Hierarchie',s:'Typ 3 вҠӮ dkfS вҠӮ Typ 2 вҠӮ Typ 1 вҠӮ Typ 0'}
          ]},
          { title:'Church-Turing-These', sub:'Alles intuitiv Berechenbare = TM-berechenbar' },
        ]},
    ]},
];

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// RENDER
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const treeEl = document.getElementById('tree');
let totalNodes = 0;

function renderTree() {
  treeEl.innerHTML = '';
  totalNodes = 0;
  TREE.forEach(branch => treeEl.appendChild(createBranch(branch)));
  document.getElementById('stat-total').textContent = totalNodes;
  updateStats();
}

function createBranch(data) {
  totalNodes++;
  const el = document.createElement('div');
  el.className = 'branch';
  el.dataset.searchText = getSearchText(data);
  const childCount = data.children ? data.children.reduce((s, t) => s + 1 + (t.children ? t.children.length : 0), 0) : 0;
  el.innerHTML =
    '<div class="branch-header" data-id="' + data.id + '">' +
      '<div class="branch-bar" style="background:' + data.color + '"></div>' +
      '<div class="branch-emoji">' + data.emoji + '</div>' +
      '<div class="branch-text">' +
        '<div class="branch-title" style="color:' + data.color + '">' + data.title + '</div>' +
        '<div class="branch-sub">' + data.sub + '</div>' +
      '</div>' +
      '<div class="branch-count">' + childCount + ' Themen</div>' +
      '<div class="branch-chevron">&#9656;</div>' +
    '</div>';
  const cw = document.createElement('div');
  cw.className = 'branch-children';
  cw.style.borderColor = data.color.replace('var(--c-','').replace(')','') ? data.color + '30' : 'rgba(255,255,255,.06)';
  if (data.children) data.children.forEach(t => cw.appendChild(createTopic(t, data.color)));
  el.appendChild(cw);
  el.querySelector('.branch-header').addEventListener('click', function() {
    const h = this, c = el.querySelector('.branch-children');
    const isOpen = h.classList.toggle('open');
    if (isOpen) { c.classList.add('open'); c.style.maxHeight = c.scrollHeight + 5000 + 'px'; }
    else { c.classList.remove('open'); c.style.maxHeight = '0'; }
    updateStats();
  });
  return el;
}

function createTopic(data, parentColor) {
  totalNodes++;
  const color = data.color || parentColor;
  const el = document.createElement('div');
  el.className = 'topic';
  el.dataset.searchText = getSearchText(data);
  const hasChildren = data.children && data.children.length > 0;
  const linkHTML = data.href ? '<a class="topic-link" href="' + data.href + '" target="_blank" onclick="event.stopPropagation()">Heft &rarr;</a>' : '';
  el.innerHTML =
    '<div class="topic-connector"></div>' +
    '<div class="topic-header">' +
      '<div class="topic-dot" style="background:' + color + ';--dot-color:' + color + '"></div>' +
      '<div class="topic-emoji">' + data.emoji + '</div>' +
      '<div class="topic-text">' +
        '<div class="topic-title">' + data.title + '</div>' +
        '<div class="topic-sub">' + data.sub + '</div>' +
      '</div>' +
      linkHTML +
      (hasChildren || data.desc ? '<div class="topic-chevron">&#9656;</div>' : '') +
    '</div>';
  if (hasChildren || data.desc) {
    const cw = document.createElement('div');
    cw.className = 'topic-children';
    if (data.desc) {
      const d = document.createElement('div');
      d.className = 'topic-desc';
      d.innerHTML = '<p>' + data.desc + '</p>';
      cw.appendChild(d);
    }
    if (data.children) data.children.forEach(c => cw.appendChild(createConcept(c, color)));
    el.appendChild(cw);
    el.querySelector('.topic-header').addEventListener('click', function() {
      const h = this, c = el.querySelector('.topic-children');
      const isOpen = h.classList.toggle('open');
      if (isOpen) { c.classList.add('open'); c.style.maxHeight = c.scrollHeight + 2000 + 'px'; }
      else { c.classList.remove('open'); c.style.maxHeight = '0'; }
      const parent = el.closest('.branch-children');
      if (parent && parent.classList.contains('open')) parent.style.maxHeight = parent.scrollHeight + 5000 + 'px';
      updateStats();
    });
  }
  return el;
}

function createConcept(data, color) {
  totalNodes++;
  const el = document.createElement('div');
  el.className = 'concept';
  el.dataset.searchText = (data.title + ' ' + data.sub + ' ' + (data.tags||[]).join(' ')).toLowerCase();
  let tagsHTML = '';
  if (data.tags) tagsHTML = '<div class="concept-tags">' + data.tags.map(t => '<span class="concept-tag">' + t + '</span>').join('') + '</div>';
  let deepHTML = '';
  if (data.deep) deepHTML = '<div class="deep-items">' + data.deep.map(d =>
    '<div class="deep-item"><div class="deep-dot" style="background:' + color + '"></div><strong>' + d.t + '</strong> ' + d.s + '</div>'
  ).join('') + '</div>';
  el.innerHTML =
    '<div class="concept-connector"></div>' +
    '<div class="concept-item">' +
      '<div class="concept-dot" style="background:' + color + '"></div>' +
      '<div class="concept-text">' +
        '<div class="concept-title">' + data.title + '</div>' +
        '<div class="concept-sub">' + data.sub + '</div>' +
        tagsHTML + deepHTML +
      '</div>' +
    '</div>';
  return el;
}

function getSearchText(data) {
  let text = (data.title + ' ' + data.sub + ' ' + (data.desc || '')).toLowerCase();
  if (data.children) data.children.forEach(c => {
    text += ' ' + (c.title + ' ' + c.sub + ' ' + (c.desc || '')).toLowerCase();
    if (c.children) c.children.forEach(cc => {
      text += ' ' + (cc.title + ' ' + cc.sub + ' ' + (cc.tags||[]).join(' ')).toLowerCase();
    });
  });
  return text;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// SEARCH
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function filterTree(query) {
  const q = query.trim().toLowerCase();
  const clearBtn = document.getElementById('searchClear');
  clearBtn.style.display = q ? 'block' : 'none';
  const branches = document.querySelectorAll('.branch');
  let anyVisible = false;
  branches.forEach(b => {
    if (!q) { b.classList.remove('hidden'); anyVisible = true; return; }
    const match = b.dataset.searchText.includes(q);
    b.classList.toggle('hidden', !match);
    if (match) {
      anyVisible = true;
      const h = b.querySelector('.branch-header');
      if (!h.classList.contains('open')) h.click();
    }
  });
  document.getElementById('noResults').style.display = anyVisible || !q ? 'none' : 'block';
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  filterTree('');
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// CONTROLS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function expandAll() {
  document.querySelectorAll('.branch-header').forEach(h => { if (!h.classList.contains('open')) h.click(); });
  setTimeout(() => {
    document.querySelectorAll('.topic-header').forEach(h => { if (!h.classList.contains('open') && h.querySelector('.topic-chevron')) h.click(); });
  }, 100);
}
function collapseAll() {
  document.querySelectorAll('.topic-header.open').forEach(h => h.click());
  setTimeout(() => { document.querySelectorAll('.branch-header.open').forEach(h => h.click()); }, 100);
}
function expandLevel(level) {
  collapseAll();
  setTimeout(() => {
    if (level >= 1) document.querySelectorAll('.branch-header').forEach(h => { if (!h.classList.contains('open')) h.click(); });
    if (level >= 2) setTimeout(() => {
      document.querySelectorAll('.topic-header').forEach(h => { if (!h.classList.contains('open') && h.querySelector('.topic-chevron')) h.click(); });
    }, 200);
  }, 200);
}
function updateStats() {
  const open = document.querySelectorAll('.branch-header.open, .topic-header.open').length;
  document.getElementById('stat-open').textContent = open;
  const total = document.querySelectorAll('.branch-header, .topic-header').length;
  document.getElementById('progress-fill').style.width = (total > 0 ? open / total * 100 : 0) + '%';
}

// Init
renderTree();
</script>
<script src="symbole.js"></script>
</body>
